<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pronos MC Les Morfalous</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1622">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pronos MCM">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --night:#0a1622; --night2:#0f2032; --steel:#16344f;
  --bone:#eef4fa; --bone-dim:#8fa6bb;
  --cyan:#1ea7e1; --cyan-deep:#0d6fa8; --red:#e23b2e;
  --line:#1d3a49; --line2:#1d3a52;
  --green:#2fa84f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--night);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(30,167,225,.12),transparent 50%),
    radial-gradient(ellipse at 90% 100%,rgba(226,59,46,.07),transparent 55%);
  color:var(--bone); font-family:'Barlow',sans-serif;
  min-height:100vh; padding:24px 16px 60px;
}
.wrap{max-width:480px;margin:0 auto}

/* header */
header{text-align:center;margin:10px 0 26px;position:relative}
.club-logo{
  width:92px;height:92px;border-radius:50%;object-fit:cover;margin-bottom:12px;
  border:3px solid var(--steel);
  box-shadow:0 0 0 4px var(--night2),0 8px 30px rgba(0,0,0,.55),0 0 30px rgba(30,167,225,.2);
}
.eyebrow{
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.34em;
  text-transform:uppercase;font-size:12px;font-weight:700;color:var(--cyan);margin-bottom:4px;
}
h1{
  font-family:'Archivo Black',sans-serif;font-size:clamp(32px,9vw,50px);
  line-height:.86;text-transform:uppercase;letter-spacing:-.025em;
  background:linear-gradient(180deg,#fff,#6fa8cc);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));
}
.tagline{color:var(--bone-dim);font-size:13px;margin-top:8px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase}

/* bande damier décorative sous le titre */
header::after{
  content:"";display:block;height:6px;width:90px;margin:14px auto 0;border-radius:3px;
  background:repeating-linear-gradient(90deg,#000 0 8px,var(--bone) 8px 16px);
  opacity:.35;
}

/* carte */
.card{
  background:linear-gradient(180deg,var(--night2),var(--night));
  border:1px solid var(--line2);border-radius:18px;
  padding:24px 22px;box-shadow:0 16px 50px rgba(0,0,0,.45);
  position:relative;overflow:hidden;
}
.card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:repeating-linear-gradient(90deg,#000 0 10px,var(--bone) 10px 20px);
  opacity:.25;
}

/* onglets */
.tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--night);
  border:1px solid var(--line);border-radius:12px;padding:4px}
.tab{
  flex:1;padding:10px;border:none;background:none;cursor:pointer;border-radius:9px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;
  text-transform:uppercase;letter-spacing:.08em;color:var(--bone-dim);
}
.tab.active{background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff}

/* champs */
.field{margin-bottom:14px}
.field label{
  display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.08em;font-size:12px;font-weight:600;color:var(--bone-dim);margin-bottom:5px;
}
.field input{
  width:100%;padding:12px 14px;border-radius:11px;
  background:var(--night);border:1.5px solid var(--line2);
  color:var(--bone);font-family:'Barlow',sans-serif;font-size:15px;
}
.field input:focus{outline:none;border-color:var(--cyan)}
.row2{display:flex;gap:10px}
.row2 .field{flex:1}

.btn{
  width:100%;padding:13px;border-radius:11px;border:none;cursor:pointer;margin-top:6px;
  background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;font-size:16px;
}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none}

.msg{margin-top:14px;padding:11px 14px;border-radius:10px;font-size:13.5px;
  text-align:center;line-height:1.4;display:none}
.msg.show{display:block}
.msg.err{background:rgba(226,59,46,.12);border:1px solid rgba(226,59,46,.35);color:#ff8a80}
.msg.ok{background:rgba(47,168,79,.12);border:1px solid rgba(47,168,79,.35);color:#7ee29a}

.hint{font-size:12px;color:var(--bone-dim);margin-top:4px;line-height:1.35}
.confirm-note{font-size:13px;color:var(--bone);line-height:1.5;margin:4px 0 14px;
  padding:11px 13px;border-radius:11px;
  background:rgba(30,167,225,.10);border:1px solid rgba(30,167,225,.35)}
.confirm-note b{color:#fff}
.confirm-hint{font-size:12px;color:var(--bone-dim);line-height:1.4;margin-top:12px;text-align:center}
.confirm-hint b{color:var(--cyan)}
.auth-success{font-size:14px;color:#fff;line-height:1.5;margin-bottom:16px;
  padding:13px 14px;border-radius:11px;
  background:linear-gradient(135deg,rgba(46,204,113,.22),rgba(30,167,225,.16));
  border:1px solid rgba(46,204,113,.5)}
.auth-success b{color:#fff}
.auth-error-banner{font-size:13px;color:var(--bone);line-height:1.5;margin-bottom:16px;
  padding:12px 14px;border-radius:11px;
  background:rgba(226,59,46,.12);border:1px solid rgba(226,59,46,.4)}
.auth-contact{margin-top:18px;padding-top:14px;border-top:1px solid var(--line2);
  text-align:center;font-size:12.5px;color:var(--bone-dim);line-height:1.5}
.auth-contact a{color:var(--cyan);font-weight:600;text-decoration:none}
.auth-contact a:hover{text-decoration:underline}
.forgot{background:none;border:none;color:var(--cyan);cursor:pointer;font-size:13px;
  margin-top:12px;display:block;width:100%;text-align:center;font-family:'Barlow',sans-serif}
.forgot:hover{text-decoration:underline}

/* écran connecté (provisoire) */
.welcome{text-align:center;padding:20px 0}
.welcome .big{font-family:'Archivo Black',sans-serif;font-size:26px;margin:10px 0;text-transform:uppercase}
.welcome .sub{color:var(--bone-dim);font-size:15px;line-height:1.5;margin-bottom:20px}
.badge-admin{display:inline-block;margin-top:6px;padding:4px 12px;border-radius:999px;
  background:rgba(226,59,46,.15);border:1px solid var(--red);color:#ff8a80;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:12px;font-weight:700}
.btn-ghost{background:none;border:1px solid var(--line2);color:var(--bone-dim);
  padding:10px 18px;border-radius:10px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.08em;font-size:13px;margin-top:8px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.loading{text-align:center;color:var(--bone-dim);padding:40px 0;font-size:15px}
.placeholder{text-align:center;color:var(--bone-dim);padding:30px 10px;font-size:15px;line-height:1.5}

/* sélecteur de championnat */
.champ-selector{display:flex;gap:6px;margin-bottom:14px;justify-content:center}
.champ-btn{flex:1;max-width:130px;padding:9px 6px;border:1.5px solid var(--line2);
  background:var(--night);cursor:pointer;border-radius:10px;
  font-family:'Archivo Black',sans-serif;font-size:13px;text-transform:uppercase;
  letter-spacing:.02em;color:var(--bone-dim);
  display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.1}
.champ-btn .champ-ico{font-size:18px;line-height:1}
.champ-btn .champ-lbl{font-size:11.5px}
.champ-btn.active{background:linear-gradient(180deg,var(--red),#b32a20);color:#fff;border-color:var(--red)}
.champ-btn:hover:not(.active){border-color:var(--cyan);color:var(--cyan)}

/* topbar */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.topbar-user{display:flex;align-items:center;gap:10px}
.hello{font-size:15px;color:var(--bone)}
.hello b{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.03em}
.hello-btn{background:none;border:none;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:5px}
.hello-btn:hover .edit-ico{opacity:1}
.edit-ico{font-size:12px;color:var(--cyan);opacity:.5;transition:opacity .15s}
.pf-info{display:flex;gap:18px;margin:4px 0 6px;font-size:13px;color:var(--bone-dim)}
.pf-lab{display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  font-size:10px;letter-spacing:.06em;color:var(--steel)}
.btn-ghost.sm{margin-top:0;padding:7px 12px;font-size:11px}

/* navigation */
.nav{display:flex;gap:4px;margin-bottom:18px;background:var(--night2);
  border:1px solid var(--line);border-radius:12px;padding:4px;flex-wrap:wrap}
.nav-btn{flex:1 1 auto;padding:9px 6px;border:none;background:none;cursor:pointer;border-radius:9px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12.5px;
  text-transform:uppercase;letter-spacing:.02em;color:var(--bone-dim);white-space:nowrap}
.nav-btn.active{background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff}
/* bouton Jouer mis en avant */
.nav-btn.play{color:var(--cyan);border:1.5px solid var(--cyan);font-size:13.5px;padding:8px 12px}
.nav-btn.play .nav-ico{margin-right:4px}
.nav-btn.play.active{background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff;
  border-color:var(--cyan);box-shadow:0 0 14px rgba(30,167,225,.4)}
.nav-btn.play:not(.active):hover{background:rgba(30,167,225,.1)}

/* ===== NAVIGATION MIX : accueil champ + burger ===== */
/* bouton burger */
.burger-btn{width:42px;height:42px;border-radius:11px;border:1px solid var(--line2);
  background:var(--night2);color:var(--cyan);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.burger-btn:hover{border-color:var(--cyan)}
.hello-big{font-size:22px}
.hello-big b{font-size:24px}

/* hero accueil */
.home-loading{text-align:center;color:var(--bone-dim);padding:40px;font-size:14px}
.home-head{text-align:center;margin:6px 0 18px}
.home-kicker{color:var(--cyan);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.18em;font-size:13px;font-weight:700;margin-bottom:2px}
.home-name{color:#fff;font-family:'Archivo Black',sans-serif;font-size:clamp(28px,8vw,38px);
  line-height:1;text-transform:uppercase;text-shadow:0 2px 16px rgba(0,0,0,.4)}
.home-name span{color:var(--cyan)}
.home-sub{color:var(--bone-dim);font-size:13px;margin-top:8px;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.04em}
.home-section-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--bone-dim);
  text-transform:uppercase;letter-spacing:.06em;margin:6px 2px 10px}

/* en-tête héro accueil (sport) */
.home-hero{display:flex;align-items:center;gap:14px;margin:4px 0 18px;padding:14px 16px;
  border-radius:16px;position:relative;overflow:hidden;
  background:linear-gradient(120deg, var(--night2) 60%, rgba(30,167,225,.12));
  border:1px solid var(--line2)}
.home-hero::before{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 10px, transparent 10px 20px)}
.home-hero::after{content:'';position:absolute;right:-30px;top:0;bottom:0;width:120px;
  background:linear-gradient(90deg, transparent, rgba(226,59,46,.18));transform:skewX(-12deg)}
.hero-logo{width:64px;height:64px;flex-shrink:0;border-radius:50%;background:var(--night);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:2px solid var(--cyan);box-shadow:0 0 18px rgba(30,167,225,.35);z-index:1}
.hero-logo img{width:100%;height:100%;object-fit:cover}
.hero-titles{display:flex;flex-direction:column;min-width:0;z-index:1}
.hero-kicker{color:var(--cyan);font-family:'Barlow Condensed',sans-serif;font-weight:700;
  text-transform:uppercase;letter-spacing:.16em;font-size:12px;margin-bottom:1px}
.hero-title{margin:0;font-family:'Archivo Black',sans-serif;font-style:italic;
  font-size:clamp(24px,7vw,32px);line-height:.92;text-transform:uppercase;color:#fff;
  letter-spacing:-.01em;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.hero-title span{display:block;color:var(--cyan)}
.hero-tag{color:var(--bone-dim);font-family:'Barlow Condensed',sans-serif;font-size:13px;
  margin-top:6px;letter-spacing:.02em}

/* rappel "ça ferme bientôt" */
.home-alert{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:14px;margin-bottom:14px;
  background:linear-gradient(120deg, rgba(226,59,46,.18), rgba(226,59,46,.06));
  border:1px solid rgba(226,59,46,.5);animation:fadeUp .4s ease both, alertpulse 2s ease-in-out infinite}
@keyframes alertpulse{0%,100%{box-shadow:0 0 0 0 rgba(226,59,46,.35)}50%{box-shadow:0 0 0 8px rgba(226,59,46,0)}}
.home-alert .ha-ico{font-size:24px;flex-shrink:0}
.home-alert .ha-body{display:flex;flex-direction:column;gap:1px}
.home-alert .ha-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#fff;text-transform:uppercase;letter-spacing:.02em}
.home-alert .ha-sub{font-size:12.5px;color:var(--bone)}

/* encart En bref (résumé) */
.home-bref{display:block;width:100%;text-align:left;padding:14px 15px;border-radius:15px;margin-bottom:16px;
  background:var(--night2);border:1px solid var(--line2);cursor:pointer;
  transition:transform .12s ease,border-color .12s ease;animation:fadeUp .45s ease both}
.home-bref:hover{transform:translateY(-2px);border-color:var(--cyan)}
.home-bref .hb-head{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.home-bref .hb-ico{font-size:17px}
.home-bref .hb-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#fff;
  text-transform:uppercase;letter-spacing:.03em;flex:1}
.home-bref .hb-more{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--cyan);
  text-transform:uppercase;letter-spacing:.03em;font-weight:700}
.home-bref .hb-list{display:flex;flex-direction:column;gap:7px}
.home-bref .hb-item{display:flex;gap:8px;align-items:flex-start;font-size:13px;line-height:1.35;color:var(--bone)}
.home-bref .hb-iico{flex-shrink:0}
.home-bref .hb-item b{color:#fff;font-weight:700}
.home-bref .hb-empty{font-size:12.5px;color:var(--bone-dim);font-style:italic}

/* actus dans la page En bref */
.ac-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.ac-row:last-child{border-bottom:none}
.ac-ava{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Archivo Black',sans-serif;font-size:14px;color:#08131f;flex-shrink:0}
.ac-ico{font-size:17px;flex-shrink:0;margin-top:5px}
.ac-txt{font-size:14px;line-height:1.4;color:var(--bone);padding-top:4px}
.ac-txt b{color:#fff;font-weight:700}
.ac-champ{display:inline-block;font-size:10px;color:var(--cyan);font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.03em;font-weight:700;margin-left:2px}

/* sections par semaine (En bref) */
.wk{border:1px solid var(--line2);border-radius:12px;margin-top:10px;overflow:hidden;background:var(--night)}
.wk-head{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;cursor:pointer;
  background:none;border:none;text-align:left}
.wk-title{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:15px;color:#fff;
  text-transform:uppercase;flex:1}
.wk-count{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--bone-dim);
  text-transform:uppercase;letter-spacing:.03em}
.wk-chev{color:var(--cyan);font-size:13px;transition:transform .25s ease}
.wk.open .wk-chev{transform:rotate(90deg)}
.wk-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.wk.open .wk-body{max-height:4000px}
.wk-inner{padding:0 14px 8px}

/* cartes championnat (accueil) */
.champ-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.champ-card{border:1.5px solid var(--line2);border-radius:16px;background:var(--night2);
  padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;
  transition:transform .14s ease,border-color .14s ease,box-shadow .14s ease;
  animation:fadeUp .45s ease both;position:relative;overflow:hidden}
.champ-card::after{content:'';position:absolute;top:0;left:-60%;width:50%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.07),transparent);
  transform:skewX(-18deg);transition:left .5s ease}
.champ-card:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.35)}
.champ-card:hover::after{left:130%}
.champ-card:active{transform:scale(.98)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.cc-pastille{width:100%;aspect-ratio:1.4/1;max-height:120px;border-radius:13px;background:#fff;
  display:flex;align-items:center;justify-content:center;overflow:hidden;padding:6px}
.cc-pastille img{width:100%;height:100%;object-fit:contain}
.cc-emoji{font-size:46px}
.cc-name{color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  text-transform:uppercase;letter-spacing:.02em}
.cc-meta{color:var(--bone-dim);font-size:11.5px;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.04em}

/* titre de saison */
.hsl-saison{color:var(--cyan);font-weight:700}

/* flèche flottante "scroller pour voir plus" (accueil) */
.scroll-hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:60;
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg, rgba(30,167,225,.9), rgba(13,111,168,.9));
  color:#fff;font-size:24px;font-weight:700;line-height:1;pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.4);transition:opacity .3s ease;
  animation:hintBounce 1.6s ease-in-out infinite}
@keyframes hintBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(4px)}}

/* championnat terminé : léger grisé + mention */
.champ-card.is-done{opacity:.62;filter:grayscale(.35)}
.champ-card.is-done:hover{opacity:.85;filter:grayscale(0)}
.cc-done{position:absolute;top:8px;right:8px;z-index:2;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10.5px;
  text-transform:uppercase;letter-spacing:.06em;color:var(--bone);
  background:rgba(10,22,34,.82);border:1px solid var(--line2);
  padding:2px 8px;border-radius:20px}
.done-toggle{display:flex;align-items:center;gap:10px;padding:11px 13px;margin-bottom:14px;
  background:var(--night);border:1px solid var(--line2);border-radius:11px;cursor:pointer;
  font-size:13.5px;color:var(--bone)}
.done-toggle input{width:18px;height:18px;flex-shrink:0;accent-color:var(--cyan);cursor:pointer}
.done-toggle b{color:#fff}

/* admin pilotes US (fiche unique + listes) */
.pil-us-list{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.pil-us-row{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;
  background:var(--night);border:1px solid var(--line2);border-radius:10px;cursor:pointer;text-align:left}
.pil-us-row:hover{background:#0d2030}
.pil-us-num{font-family:'Archivo Black',sans-serif;color:var(--cyan);font-size:13px;min-width:38px}
.pil-us-nom{color:#fff;flex:1;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px}
.pil-us-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;max-width:52%}
.pil-us-edit{color:var(--bone-dim)}
.pil-editor{margin-top:16px;padding:16px;background:var(--night2);border:2px solid var(--cyan);border-radius:14px}
/* modale pilote */
.pil-modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(4,10,18,.75);
  display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.pil-modal{background:var(--night2);border:1px solid var(--line2);border-radius:16px;
  padding:18px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.5)}
.pm-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;
  background:var(--night);border:1px solid var(--line2);color:var(--bone-dim);font-size:15px;cursor:pointer}
/* sélecteur de championnat admin */
.admin-champ-sel{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.admin-champ-sel::-webkit-scrollbar{display:none}
.acs-btn{flex:0 0 auto;min-width:58px;padding:7px 6px;border:1.5px solid var(--line2);
  background:var(--night);cursor:pointer;border-radius:9px;display:flex;flex-direction:column;
  align-items:center;gap:2px;color:var(--bone-dim);font-family:'Archivo Black',sans-serif}
.acs-btn .acs-ico{font-size:15px}
.acs-btn .acs-lbl{font-size:8.5px;text-transform:uppercase;white-space:nowrap}
.acs-btn.active{background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff;border-color:var(--cyan)}

/* stats du club */
.scl-block{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.scl-block:first-of-type{border-top:none;padding-top:0}
.scl-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#fff;text-transform:uppercase;letter-spacing:.02em}
.scl-desc{color:var(--bone-dim);font-size:12px;margin:2px 0 8px}
.scl-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:9px;margin-bottom:4px;background:var(--night)}
.scl-row.first{background:linear-gradient(90deg, rgba(255,217,84,.12), var(--night));border:1px solid rgba(255,217,84,.3)}
.scl-rk{font-family:'Archivo Black',sans-serif;color:var(--cyan);font-size:13px;min-width:18px}
.scl-row.first .scl-rk{color:#ffd954}
.scl-name{flex:1;display:flex;align-items:center;gap:8px;color:var(--bone);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px}
.scl-ava{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0}
.scl-val{font-family:'Archivo Black',sans-serif;font-size:14px;color:#fff}
.scl-val small{font-family:'Barlow Condensed',sans-serif;font-weight:400;color:var(--bone-dim);font-size:11px}
.scl-none{color:var(--bone-dim);font-size:13px;padding:6px 0}
.scl-highlights{display:flex;flex-direction:column;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.scl-hl{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--night);border-radius:10px}
.scl-hl-ico{font-size:22px}
.scl-hl-lbl{color:var(--bone-dim);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em}
.scl-hl-val{color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px}
.pe-title{color:#fff;font-family:'Archivo Black',sans-serif;font-size:16px;margin-bottom:14px}
.pe-ident{display:flex;gap:10px;margin-bottom:16px}
.pe-field label{color:var(--bone-dim);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em}
.pe-field input{width:100%;padding:9px;background:var(--night);border:1px solid var(--line2);border-radius:8px;color:#fff;font-size:15px;margin-top:3px}
.pe-num{flex:0 0 80px}.pe-nom{flex:1}
.pe-lbl{color:var(--bone-dim);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.pe-grp{margin-bottom:14px}
.pe-grp-title{color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;margin-bottom:6px}
.pe-checks{display:flex;gap:8px;flex-wrap:wrap}
.pe-check{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--night);
  border:1px solid var(--line2);border-radius:8px;color:var(--bone);font-size:13px;cursor:pointer}
.pe-check.on{background:#12304a;border-color:var(--cyan);color:#fff}
.pe-check input{accent-color:var(--cyan);cursor:pointer}
.pe-actions{display:flex;gap:8px;margin-top:16px}
.pe-save{flex:1;padding:11px;background:linear-gradient(180deg,var(--green),#1f7a38);color:#fff;
  border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;
  text-transform:uppercase;cursor:pointer}
.pe-del{padding:11px 16px;background:var(--steel);color:var(--red);border:1px solid var(--red);
  border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;cursor:pointer}

/* barre de switch rapide (dans un championnat) */
.champ-switch{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:2px}
.champ-switch::-webkit-scrollbar{display:none}
.champ-switch-wrap{position:relative}
.switch-fade{position:absolute;top:0;right:0;bottom:12px;width:38px;pointer-events:none;
  display:flex;align-items:center;justify-content:flex-end;padding-right:4px;
  background:linear-gradient(90deg, transparent, var(--night2) 70%);
  color:var(--cyan);font-size:22px;font-weight:700;transition:opacity .2s ease}
.champ-switch .champ-btn{flex:0 0 auto;min-width:70px;padding:8px 6px 7px;border:1.5px solid var(--line2);
  background:var(--night2);cursor:pointer;border-radius:11px;
  display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--bone-dim);
  font-family:'Archivo Black',sans-serif}
.champ-switch .champ-btn .champ-pastille{width:40px;height:40px;border-radius:9px;background:#fff;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.champ-switch .champ-btn .champ-pastille img{width:100%;height:100%;object-fit:contain}
.champ-switch .champ-btn .champ-ico{font-size:20px;line-height:1}
.champ-switch .champ-btn .champ-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap}
.champ-switch .champ-btn.active{border-color:var(--cyan);background:#12304a;box-shadow:0 0 14px rgba(30,167,225,.3)}
.champ-switch .champ-btn.active .champ-lbl{color:#fff}

/* encadré explicatif SMX */
.smx-info{background:linear-gradient(135deg, rgba(255,217,84,.1), var(--night2));
  border:1px solid rgba(255,217,84,.35);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.smx-info-head{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#fff;
  text-transform:uppercase;letter-spacing:.02em;margin-bottom:8px}
.smx-info-head .smx-star{margin-right:4px}
.smx-info p{font-size:13.5px;line-height:1.5;color:var(--bone);margin:0 0 8px}
.smx-info p:last-child{margin-bottom:0}
.smx-info .smx-dates{font-size:12.5px;color:#ffd954;font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.02em;padding-top:8px;border-top:1px solid var(--line);text-align:center}

/* menu drawer (burger) */
.menu-overlay{position:fixed;inset:0;z-index:1000;background:rgba(4,10,17,.6);
  display:flex;justify-content:flex-end;animation:menufade .15s ease}
@keyframes menufade{from{opacity:0}to{opacity:1}}
.menu-drawer{width:300px;max-width:84vw;height:100%;background:var(--night2);
  border-left:1px solid var(--line2);box-shadow:-12px 0 40px rgba(0,0,0,.5);
  display:flex;flex-direction:column;animation:menuslide .2s ease}
@keyframes menuslide{from{transform:translateX(40px);opacity:.5}to{transform:none;opacity:1}}
.menu-head{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;
  border-bottom:1px solid var(--line2);color:var(--bone-dim);font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.06em;font-size:14px;font-weight:700}
.menu-close{background:none;border:none;color:var(--bone-dim);font-size:26px;cursor:pointer;line-height:1}
.menu-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;
  border:none;border-bottom:1px solid var(--line);color:var(--bone);padding:16px 18px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:.02em}
.menu-item:hover{background:var(--night)}
.menu-item .mi-ico{font-size:18px;width:24px;text-align:center}
.menu-item.danger{color:#ff6b5e;margin-top:auto;border-bottom:none;border-top:1px solid var(--line2)}

/* stats perso dans le modal profil */
.pf-stats-wrap{margin:6px 0 4px}
.pf-stats-loading{color:var(--bone-dim);font-size:13px;text-align:center;padding:14px;font-style:italic}
.pf-stats-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--cyan);
  text-transform:uppercase;letter-spacing:.05em;margin:6px 0 10px}
.pf-stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.pf-stat{background:var(--night);border:1px solid var(--line2);border-radius:11px;padding:10px 6px;text-align:center}
.pf-stat.hl{border-color:rgba(30,167,225,.5);background:rgba(30,167,225,.07)}
.pf-stat .pfv{font-family:'Archivo Black',sans-serif;font-size:18px;color:#fff;line-height:1.1;font-variant-numeric:tabular-nums}
.pf-stat .pfv-gold{color:#ffd954}
.pf-stat .pfl{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--bone-dim);
  text-transform:uppercase;letter-spacing:.03em;margin-top:3px;line-height:1.2}
.pf-stat-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:9px 11px;background:var(--night);border:1px solid var(--line2);border-radius:11px;margin-bottom:8px}
.pf-stat-row .pfl{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--bone-dim);
  text-transform:uppercase;letter-spacing:.03em}
.pf-rowval{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--green);
  text-align:right;display:flex;flex-direction:column;line-height:1.2}
.pf-rowval small{font-weight:400;font-size:10.5px;color:var(--bone-dim);text-transform:none;letter-spacing:0}
.pf-rowval.pf-pilote{color:#ffd954;font-size:15px}

/* comparateur de stats */
.cmp-select{width:100%;padding:12px 13px;border-radius:11px;background:var(--night);
  border:1px solid var(--line2);color:var(--bone);font-size:15px;font-family:inherit;margin-bottom:12px}
.cmp-select:focus{outline:none;border-color:var(--cyan)}
.cmp-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--line2)}
.cmp-head .cmp-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;
  color:#fff;text-transform:uppercase;letter-spacing:.02em;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmp-head .cmp-vs{font-family:'Archivo Black',sans-serif;font-size:13px;color:var(--cyan);flex-shrink:0}
.cmp-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}
.cmp-row:last-child{border-bottom:none}
.cmp-a,.cmp-b{flex:1;text-align:center;font-family:'Archivo Black',sans-serif;font-size:18px;
  color:var(--bone-dim);font-variant-numeric:tabular-nums}
.cmp-lbl{flex:1.4;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;
  color:var(--bone-dim);text-transform:uppercase;letter-spacing:.03em}
.cmp-win{color:var(--green)!important}

/* avatars thème moto */
.av-emoji{font-size:1.05em;line-height:1}
.avatar-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:4px}
.avatar-opt{aspect-ratio:1;border:1.5px solid var(--line2);border-radius:10px;background:var(--night);
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;
  transition:transform .1s ease,border-color .1s ease}
.avatar-opt:hover{border-color:var(--cyan)}
.avatar-opt.sel{border-color:var(--cyan);background:rgba(30,167,225,.15);transform:scale(1.05)}
.cm-avatar{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-size:13px;font-family:'Archivo Black',sans-serif;color:#08131f;flex-shrink:0;margin-right:5px;line-height:1}

/* sections */
.sec-title{font-family:'Archivo Black',sans-serif;font-size:18px;text-transform:uppercase;
  margin-bottom:6px;color:var(--bone)}
.sec-sub{color:var(--bone-dim);font-size:13px;margin-bottom:16px;line-height:1.4}

/* table admin */
.ad-table{width:100%;border-collapse:collapse;font-size:13px}
.ad-table th{text-align:left;padding:8px 6px;color:var(--bone-dim);
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;
  font-size:11px;border-bottom:1px solid var(--line2)}
.ad-table td{padding:10px 6px;border-bottom:1px solid var(--line);vertical-align:middle}
.ad-ord{color:var(--bone-dim);font-family:'Archivo Black',sans-serif;font-size:13px}
.ad-nom{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase}
.ad-date{display:block;font-family:'Barlow',sans-serif;font-weight:400;font-size:11px;
  color:var(--bone-dim);text-transform:none;letter-spacing:0}
.ad-close{font-variant-numeric:tabular-nums;color:var(--bone-dim);font-size:12px}
.tag-done{color:var(--bone-dim);font-size:11px;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.05em}
.tag-open{color:var(--cyan);font-size:11px;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.05em;font-weight:700}

/* sous-navigation pronos */
.subnav{display:flex;gap:6px;margin-bottom:16px}
.sub-btn{flex:1;padding:9px;border:1px solid var(--line2);background:var(--night);cursor:pointer;
  border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;
  text-transform:uppercase;letter-spacing:.06em;color:var(--bone-dim)}
.sub-btn.active{background:var(--night2);border-color:var(--cyan);color:var(--cyan)}

/* liste des manches */
.grp-title{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
  font-size:12px;color:var(--cyan);font-weight:700;margin:6px 0 10px}
.grp-title.muted{color:var(--bone-dim);margin-top:20px}
.manche-row{display:flex;align-items:center;gap:12px;width:100%;cursor:pointer;text-align:left;
  background:#13283d;border:1.5px solid var(--line2);border-radius:12px;padding:13px 14px;margin-bottom:9px;
  transition:border-color .15s,transform .1s}
.manche-row:hover{border-color:var(--cyan);transform:translateY(-1px)}
.manche-row.closed{opacity:.6}
.manche-row.closed:has(.m-podium){opacity:.85}
.manche-row.closed:hover{border-color:var(--line2);transform:none}
.m-ord{font-family:'Archivo Black',sans-serif;font-size:15px;color:var(--bone);min-width:34px;
  height:34px;display:flex;align-items:center;justify-content:center;
  background:var(--night);border:2px solid var(--steel);border-radius:7px;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
.m-info{flex:1;min-width:0}
.m-nom{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  text-transform:uppercase;color:#fff}
.m-date{display:block;font-size:12px;color:var(--bone-dim);text-transform:capitalize}
.m-state{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.m-open{color:var(--cyan);font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em}
.m-closed{color:var(--bone-dim);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.m-done{color:var(--green);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em}
.m-partial{color:#e0a52e;font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.tag-done2{color:var(--green);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.tag-partial{color:#e0a52e;font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.tag-none{color:var(--bone-dim);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
/* mini-podium dans une manche fermée */
.m-podium{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.m-podium .mp-cat{font-size:9px;color:var(--cyan);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:1px}
.m-podium .mp-line{display:flex;align-items:center;gap:5px;font-size:11px;line-height:1.3;color:var(--bone);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.m-podium .mp-medal{font-size:11px;flex-shrink:0}
.m-podium .mp-name{overflow:hidden;text-overflow:ellipsis}

/* écran prono : podium */
.back{background:none;border:none;color:var(--cyan);cursor:pointer;font-size:13px;
  font-family:'Barlow',sans-serif;margin-bottom:12px;padding:0}
.back:hover{text-decoration:underline}
.countdown-banner{background:rgba(30,167,225,.1);border:1px solid rgba(30,167,225,.35);
  color:var(--cyan);text-align:center;padding:10px;border-radius:10px;margin-bottom:16px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;font-size:14px;font-variant-numeric:tabular-nums}

/* bandeau de statut du prono */
.status-banner{text-align:center;padding:11px 14px;border-radius:10px;margin-bottom:10px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13.5px;line-height:1.4}
.status-banner.open{background:rgba(30,167,225,.08);border:1px solid rgba(30,167,225,.3);color:var(--cyan)}
.status-banner.done{background:rgba(47,168,79,.1);border:1px solid rgba(47,168,79,.35);color:#7ee29a}
.status-banner.closed{background:var(--night2);border:1px solid var(--line2);color:var(--bone-dim)}

/* modale de confirmation */
.confirm-modal{text-align:center}
.confirm-check{width:60px;height:60px;border-radius:50%;margin:0 auto 14px;
  background:linear-gradient(180deg,var(--green),#1f7a38);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;
  box-shadow:0 6px 20px rgba(47,168,79,.4)}
.confirm-title{font-family:'Archivo Black',sans-serif;font-size:20px;text-transform:uppercase;
  margin-bottom:10px;color:#fff}
.confirm-text{color:var(--bone-dim);font-size:14px;line-height:1.5;margin-bottom:18px}
.confirm-text b{color:var(--bone)}

/* bouton supprimer */
.btn-del{width:100%;padding:11px;margin-top:10px;border:1px solid rgba(226,59,46,.4);
  background:rgba(226,59,46,.08);color:#ff8a80;border-radius:11px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;
  font-weight:700;font-size:13px}
.btn-del:hover{background:rgba(226,59,46,.15)}
.btn-del-account{width:100%;margin-top:16px;padding:9px;background:none;border:none;
  color:var(--bone-dim);font-size:12px;cursor:pointer;text-decoration:underline;
  font-family:'Barlow',sans-serif}
.btn-del-account:hover{color:#ff8a80}

/* vue mes pronos */
.mp-manche{background:var(--night);border:1px solid var(--line2);border-radius:12px;
  padding:14px;margin-bottom:12px}
.mp-manche.champ{border-color:rgba(255,217,84,.3);background:rgba(255,217,84,.04)}
.mp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mp-nom{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  text-transform:uppercase;color:#fff}
.mp-status{font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.05em;font-weight:600}
.mp-status.open{color:var(--cyan)}
.mp-status.closed{color:var(--bone-dim)}
.mp-cat{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:13px}
.mp-podium{color:var(--bone);line-height:1.5;flex:1}
/* détail des points par catégorie (manche fermée) */
.mp-score{display:flex;align-items:center;gap:8px;margin:2px 0 9px 0;padding:6px 9px;
  border-radius:9px;background:var(--night);border:1px solid var(--line2);flex-wrap:wrap}
.mp-score .ms-tot{font-family:'Archivo Black',sans-serif;font-size:15px;font-variant-numeric:tabular-nums;
  color:var(--green)}
.mp-score .ms-tot.neg{color:#ff6b5e}
.mp-score .ms-tot.zero{color:var(--bone-dim)}
.mp-score .ms-detail{font-size:11.5px;color:var(--bone-dim);font-family:'Barlow Condensed',sans-serif;

.mp-score .ms-bonus{color:#ffd954}
.mp-score .ms-malus{color:#ff6b5e}
.mp-score .ms-pending{font-size:11.5px;color:var(--cyan);font-family:'Barlow Condensed',sans-serif;

.mp-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.mp-edit,.mp-del{flex:1;padding:8px;border-radius:8px;cursor:pointer;

.mp-edit{background:var(--steel);color:#fff;border:none}
.mp-edit:hover{background:var(--cyan-deep)}
.mp-del{background:none;color:#ff8a80;border:1px solid rgba(226,59,46,.4)}
.mp-del:hover{background:rgba(226,59,46,.12)}

/* stats perso (haut de Mes pronos) */
.perso-stats{display:flex;gap:8px;margin-bottom:18px}
.ps-item{flex:1;background:var(--night);border:1px solid var(--line2);border-radius:11px;
  padding:12px 8px;text-align:center;min-width:0}
.ps-val{font-family:'Archivo Black',sans-serif;font-size:19px;color:var(--cyan);
  font-variant-numeric:tabular-nums;line-height:1.1;margin-bottom:5px}
.ps-val.ps-pilote{font-size:13px;color:#ffd954;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps-lab{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em;
  font-size:10px;color:var(--bone-dim);line-height:1.2}

/* vue stats */
.stat-sec{margin-bottom:24px}
.stat-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  text-transform:uppercase;letter-spacing:.03em;color:#fff;margin-bottom:3px}
.stat-desc{font-size:12.5px;color:var(--bone-dim);margin-bottom:12px;line-height:1.4}
.stat-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.stat-rk{font-family:'Archivo Black',sans-serif;font-size:13px;color:var(--steel);min-width:22px}
.stat-dot{color:var(--cyan);min-width:22px;text-align:center;font-size:16px}
.stat-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;
  display:flex;align-items:center;gap:7px;color:var(--bone)}
.stat-val{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--cyan);
  white-space:nowrap;font-variant-numeric:tabular-nums}
.stat-sub{font-family:'Barlow',sans-serif;font-weight:400;font-size:11px;color:var(--bone-dim)}
.podium{background:var(--night);border:1px solid var(--line2);border-radius:13px;padding:16px;margin-bottom:14px}
.podium-head{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.cat-tag{font-family:'Archivo Black',sans-serif;font-size:13px;padding:2px 9px;border-radius:6px;color:#fff;background:var(--steel)}
.cat-450{background:var(--red)}
.cat-250{background:var(--cyan-deep)}
.cat-250-West{background:#0d6fa8}
.cat-250-East{background:#c85a1e}
.cat-nations{background:linear-gradient(135deg,var(--red),var(--cyan-deep))}
.cat-mini{background:var(--steel)}

/* épreuves annulées */
.m-annulee{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;
  text-transform:uppercase;letter-spacing:.05em;color:#ff8a80;
  background:rgba(226,59,46,.12);padding:3px 9px;border-radius:6px}
.manche-row.annulee{opacity:.55;cursor:default}
.manche-row.annulee .m-nom{text-decoration:line-through}
.admin-manche-wrap{display:flex;gap:8px;align-items:stretch;margin-bottom:8px}
.admin-manche-wrap .manche-row{flex:1;margin-bottom:0}
.admin-manche-wrap.is-annulee .manche-row{opacity:.55}
.admin-manche-wrap.is-annulee .m-nom{text-decoration:line-through}
.annul-btn{flex-shrink:0;padding:0 12px;border-radius:9px;cursor:pointer;
  border:1px solid var(--line2);background:var(--night);color:var(--bone-dim);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  text-transform:uppercase;letter-spacing:.04em}
.annul-btn:hover{border-color:var(--red);color:#ff8a80}

/* bandeau d'alerte (rappel pronos) */
.alert-banner{display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,rgba(226,59,46,.18),rgba(30,167,225,.14));
  border:1px solid rgba(226,59,46,.4);border-radius:11px;padding:11px 14px;margin-bottom:14px;
  font-size:13.5px;color:var(--bone);line-height:1.4;cursor:pointer;transition:border-color .15s,transform .1s}
.alert-banner:hover{border-color:rgba(226,59,46,.75)}
.alert-banner:active{transform:scale(.99)}
.alert-banner b{color:#fff}
.alert-close{margin-left:auto;background:none;border:none;color:var(--bone-dim);
  font-size:15px;cursor:pointer;flex-shrink:0;padding:0 4px}
.alert-close:hover{color:var(--bone)}

/* ===== SPLASH SCREEN (mode sport) ===== */
#splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;
  background:radial-gradient(120% 80% at 50% 30%, #102234 0%, var(--night) 70%);
  transition:opacity .45s ease, visibility .45s ease}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
/* lignes de vitesse en diagonale */
.splash-track{position:absolute;inset:-20% -20%;
  background:repeating-linear-gradient(115deg,
    transparent 0 38px, rgba(30,167,225,.06) 38px 40px);
  animation:splashSlide 1.1s linear infinite}
@keyframes splashSlide{from{transform:translateX(0)}to{transform:translateX(40px)}}
.splash-inner{position:relative;text-align:center;animation:splashPop .55s cubic-bezier(.2,.9,.3,1.3) both}
@keyframes splashPop{from{transform:translateY(14px) scale(.92);opacity:0}to{transform:none;opacity:1}}
.splash-logo-ring{width:148px;height:148px;margin:0 auto 22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle, rgba(30,167,225,.25), transparent 68%);
  position:relative}
.splash-logo-ring::after{content:"";position:absolute;inset:-6px;border-radius:50%;
  border:3px solid transparent;border-top-color:var(--cyan);border-right-color:var(--red);
  animation:splashSpin 1s linear infinite}
@keyframes splashSpin{to{transform:rotate(360deg)}}
.splash-logo{width:118px;height:118px;border-radius:50%;
  box-shadow:0 6px 26px rgba(0,0,0,.5)}
.splash-title{font-family:'Archivo Black',sans-serif;font-size:40px;letter-spacing:.04em;
  color:#fff;line-height:1;text-shadow:0 2px 14px rgba(30,167,225,.5)}
.splash-title::after{content:"";display:block;width:54px;height:4px;margin:10px auto 0;
  background:linear-gradient(90deg,var(--cyan),var(--red));border-radius:3px}
.splash-sub{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.28em;font-size:14px;color:var(--cyan);margin-top:12px;font-weight:700}
.splash-bar{width:170px;height:5px;margin:26px auto 0;border-radius:4px;
  background:rgba(255,255,255,.1);overflow:hidden}
.splash-bar span{display:block;height:100%;width:40%;border-radius:4px;
  background:linear-gradient(90deg,var(--cyan),var(--red));
  animation:splashLoad 1s ease-in-out infinite}
@keyframes splashLoad{0%{transform:translateX(-110%)}100%{transform:translateX(320%)}}
.splash-checker{position:absolute;bottom:0;left:0;right:0;height:30px;
  background:repeating-conic-gradient(#fff 0 25%, transparent 0 50%) 0 0/30px 30px;
  opacity:.13}

/* ===== BANDEAU D'INSTALLATION ===== */
.install-banner{display:flex;align-items:center;gap:11px;
  background:linear-gradient(135deg, var(--steel), var(--night2));
  border:1px solid rgba(30,167,225,.45);border-radius:12px;
  padding:11px 14px;margin-bottom:14px}
.install-banner .ib-ico{font-size:20px;flex-shrink:0}
.install-banner .ib-txt{flex:1;font-size:13px;color:var(--bone);line-height:1.35}
.install-banner .ib-txt b{color:#fff}
.install-banner .ib-btn{flex-shrink:0;padding:7px 13px;border:none;border-radius:9px;cursor:pointer;
  background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff;
  font-family:'Archivo Black',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.install-banner .ib-close{flex-shrink:0;background:none;border:none;color:var(--bone-dim);
  font-size:15px;cursor:pointer;padding:0 2px}
.install-banner .ib-close:hover{color:var(--bone)}
.ios-steps{margin:6px 0 12px;padding-left:22px;color:var(--bone);font-size:14px;line-height:1.7}
.ios-steps li{margin-bottom:4px}
.ios-steps b{color:#fff}
.lock{margin-left:auto;font-size:12px;color:var(--bone-dim);font-weight:400;letter-spacing:0}
.pod-row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.pod-row label{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--bone-dim);min-width:30px}
.pod-row select{flex:1;padding:11px 12px;border-radius:10px;background:var(--night2);
  border:1.5px solid var(--line2);color:var(--bone);font-family:'Barlow',sans-serif;font-size:14px}
.pod-row select:focus{outline:none;border-color:var(--cyan)}
.pod-row select:disabled{opacity:.6}
.pod-bonus{margin-top:8px;padding-top:10px;border-top:1px dashed var(--line2)}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--bone-dim);cursor:pointer;margin-bottom:8px}
.chk input{width:16px;height:16px;accent-color:var(--red)}
.bonus5.hidden{display:none}
.voted-note2{margin-top:8px;padding:12px;border-radius:10px;text-align:center;
  background:rgba(47,168,79,.12);border:1px solid rgba(47,168,79,.35);color:#7ee29a;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-weight:600;font-size:13px}

/* classement */
.rank-table{width:100%;border-collapse:collapse;font-size:14px}
.rank-table th{text-align:center;padding:8px 4px;color:var(--bone-dim);
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;
  font-size:11px;border-bottom:1px solid var(--line2)}
.rank-table th:nth-child(2){text-align:left}
.rank-table td{padding:11px 4px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle}
.rk{color:var(--bone-dim);font-family:'Archivo Black',sans-serif;font-size:13px}
.medal{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
  border-radius:50%;font-family:'Archivo Black',sans-serif;font-size:13px;color:#000}
.medal.gold{background:linear-gradient(180deg,#ffd954,#d9a400)}
.medal.silver{background:linear-gradient(180deg,#dfe7ee,#9aa9b6)}
.medal.bronze{background:linear-gradient(180deg,#d98f54,#a8632f);color:#fff}

/* ===== PODIUM TOP 3 ===== */
.podium-top{display:flex;justify-content:center;align-items:flex-end;gap:12px;
  margin:8px 0 24px;padding:22px 10px 0;position:relative;
  background:radial-gradient(120% 80% at 50% 100%, rgba(30,167,225,.10), transparent 70%);
  border-radius:14px}
.pod-col{flex:1;max-width:132px;display:flex;flex-direction:column;align-items:center;text-align:center}
/* le bloc nom+avatar+points TOMBE d'en haut avec un rebond */
.pod-drop{display:flex;flex-direction:column;align-items:center}
/* l'animation ne joue que quand la classe .play est ajoutée (rejouable, et jamais invisible sinon) */
.pod-drop.play{opacity:0;transform:translateY(-120px);animation:podFall .6s cubic-bezier(.34,1.56,.64,1) forwards}
.pod-col.p1 .pod-drop.play{animation-delay:.05s}
.pod-col.p2 .pod-drop.play{animation-delay:.30s}
.pod-col.p3 .pod-drop.play{animation-delay:.55s}
@keyframes podFall{
  0%{opacity:0;transform:translateY(-120px)}
  60%{opacity:1;transform:translateY(8px)}
  80%{transform:translateY(-4px)}
  100%{opacity:1;transform:translateY(0)}}
.pod-ava{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Archivo Black',sans-serif;font-size:23px;color:#0a1622;margin-bottom:6px;
  border:3px solid var(--night);position:relative;z-index:2}
.pod-col.p1 .pod-ava{background:linear-gradient(180deg,#ffe27a,#d9a400);width:68px;height:68px;font-size:28px;
  box-shadow:0 0 0 3px rgba(255,217,84,.35),0 0 26px rgba(255,217,84,.6);
  animation:podGlow 2.2s ease-in-out 1s infinite}
@keyframes podGlow{0%,100%{box-shadow:0 0 0 3px rgba(255,217,84,.35),0 0 22px rgba(255,217,84,.45)}
  50%{box-shadow:0 0 0 4px rgba(255,217,84,.5),0 0 34px rgba(255,217,84,.8)}}
.pod-col.p2 .pod-ava{background:linear-gradient(180deg,#eef3f8,#9aa9b6)}
.pod-col.p3 .pod-ava{background:linear-gradient(180deg,#e09a5e,#a8632f);color:#fff}
.pod-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
  font-size:14px;color:#fff;line-height:1.1;margin-bottom:3px;
  max-width:124px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod-pts{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--cyan);margin-bottom:8px}
.pod-bar{width:100%;border-radius:9px 9px 0 0;position:relative;overflow:hidden;
  border:1px solid var(--line2);border-bottom:none;
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:10px;font-family:'Archivo Black',sans-serif;font-size:22px}
.pod-bar::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
  transform:skewX(-18deg)}
@keyframes podShine{0%{left:-60%}30%,100%{left:130%}}
.pod-col.p1 .pod-bar{height:104px;color:#ffe27a;
  background:linear-gradient(180deg,#2a3f54,var(--night2));border-color:rgba(255,217,84,.45)}
.pod-col.p1 .pod-bar::after{
  background:linear-gradient(100deg,transparent,rgba(255,217,84,.55),transparent);
  animation:podShine 2.6s ease-in-out 1.1s infinite}
.pod-col.p2 .pod-bar{height:74px;color:#dfe7ee;
  background:linear-gradient(180deg,var(--steel),var(--night2));border-color:rgba(223,231,238,.4)}
.pod-col.p2 .pod-bar::after{
  background:linear-gradient(100deg,transparent,rgba(223,231,238,.5),transparent);
  animation:podShine 2.6s ease-in-out 1.45s infinite}
.pod-col.p3 .pod-bar{height:54px;color:#e09a5e;
  background:linear-gradient(180deg,var(--steel),var(--night2));border-color:rgba(224,154,94,.4)}
.pod-col.p3 .pod-bar::after{
  background:linear-gradient(100deg,transparent,rgba(224,154,94,.5),transparent);
  animation:podShine 2.6s ease-in-out 1.8s infinite}
.pod-crown{font-size:22px;margin-bottom:2px;height:24px;
  animation:podFloat 2.4s ease-in-out 1s infinite}
@keyframes podFloat{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-4px) rotate(4deg)}}
.rk-name{text-align:left!important;font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:16px;text-transform:uppercase;color:#fff}
.rk-sub{color:var(--bone-dim);font-size:13px;font-variant-numeric:tabular-nums}
.rk-total{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--cyan);
  font-variant-numeric:tabular-nums}
.rank-hint{font-size:11.5px;color:var(--bone-dim);text-align:center;margin-bottom:10px;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em}
.rank-row{cursor:pointer;transition:background .12s}
.rank-row:hover{background:rgba(30,167,225,.06)}
.detail-row td{padding:0!important;border-bottom:none!important}
.det-wrap{max-height:0;overflow:hidden;transition:max-height .25s ease}
.detail-row.open .det-wrap{max-height:600px;padding:6px 0 12px}
.det-line{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;
  margin:0 4px;border-bottom:1px solid var(--line)}
.det-label{font-size:13px;color:var(--bone-dim);display:flex;align-items:center;gap:7px}
.det-cat{font-family:'Archivo Black',sans-serif;font-size:9px;padding:1px 5px;border-radius:4px;color:#fff}
.det-pts{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--green);font-variant-numeric:tabular-nums}
.det-pts.neg{color:var(--red)}
.det-empty{font-size:12.5px;color:var(--bone-dim);text-align:center;padding:10px;font-style:italic}
/* podium top3 cliquable + panneau détail */
.podium-top .pod-col[data-uid]{cursor:pointer}
.podium-top .pod-col[data-uid] .pod-ava{transition:transform .15s ease,box-shadow .15s ease}
.podium-top .pod-col[data-uid].sel .pod-ava{transform:scale(1.06);box-shadow:0 0 0 3px var(--cyan)}
.pod-detail{margin:0 0 16px;border:1px solid var(--line2);border-radius:13px;background:var(--night);
  overflow:hidden;max-height:0;opacity:0;transition:max-height .28s ease,opacity .2s ease}
.pod-detail.open{max-height:600px;opacity:1;padding:10px 8px}
.pod-detail .pd-head{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;
  color:var(--cyan);text-transform:uppercase;letter-spacing:.04em;padding:2px 6px 8px}

/* ---- révélation animée des points ---- */
.reveal-total{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0 12px}
.reveal-total .rt-num{font-family:'Archivo Black',sans-serif;font-size:46px;line-height:1;
  font-variant-numeric:tabular-nums;color:var(--green);text-shadow:0 0 18px rgba(46,204,113,.35)}
.reveal-total .rt-num.neg{color:#ff6b5e;text-shadow:0 0 18px rgba(255,107,94,.3)}
.reveal-total .rt-num.zero{color:var(--bone-dim);text-shadow:none}
.reveal-total .rt-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.08em;font-size:12px;color:var(--bone-dim)}
.reveal-total .rt-num.pop{animation:rtpop .4s ease}
@keyframes rtpop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.det-line.rv{opacity:0;transform:translateY(8px);animation:rvline .34s ease forwards}
@keyframes rvline{to{opacity:1;transform:translateY(0)}}
.det-line.flash{animation:rvline .34s ease forwards, rvflash .6s ease}
@keyframes rvflash{0%{background:rgba(46,204,113,.0)}30%{background:rgba(46,204,113,.18)}100%{background:rgba(46,204,113,0)}}
#confettiCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* page règles */
.regles .reg-intro{color:var(--bone-dim);font-size:14px;line-height:1.5;margin-bottom:16px}

/* accordéon règlement */
.reg-acc{display:flex;flex-direction:column;gap:10px}
.reg-sec{border:1px solid var(--line2);border-radius:12px;overflow:hidden;background:var(--night)}
.reg-sec-head{display:flex;align-items:center;gap:11px;width:100%;padding:14px 15px;cursor:pointer;
  background:none;border:none;text-align:left}
.reg-sec-ico{font-size:19px}
.reg-sec-title{flex:1;font-family:'Archivo Black',sans-serif;font-style:italic;font-size:15px;
  color:#fff;text-transform:uppercase;letter-spacing:-.01em}
.reg-chev{color:var(--cyan);font-size:14px;transition:transform .25s ease}
.reg-sec.open .reg-chev{transform:rotate(90deg)}
.reg-sec-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.reg-sec.open .reg-sec-body{max-height:3000px}
.reg-sec-in{padding:0 15px 16px}
.reg-sec-in .reg-h{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;

.reg-sec-in .reg-h:first-child{margin-top:4px}
.reg-sec-in p{color:var(--bone);font-size:13.5px;line-height:1.5;margin:0 0 8px}
.reg-champ{color:var(--bone);font-size:13.5px;line-height:1.5;padding:8px 0;border-bottom:1px solid var(--line)}
.reg-champ:last-child{border-bottom:none}
.reg-note{display:block;margin-top:5px;color:#ffd954;font-size:12.5px;font-style:italic}
.reg-block{margin-bottom:20px}
.reg-h{display:flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;color:#fff}
.reg-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
  border-radius:7px;background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff;
  font-family:'Archivo Black',sans-serif;font-size:13px;flex-shrink:0}
.reg-block p{font-size:13.5px;line-height:1.55;color:var(--bone-dim)}

</div>
<div class="wrap">

  <div id="app">
    <div class="loading">Chargement…</div>
  </div>
</div>

<script>
// ====== CONFIG SUPABASE ======
const SUPABASE_URL = "https://ogfjljemwoeavqiagnhj.supabase.co";
const SUPABASE_KEY = "sb_publishable_LQg-9wRHZRHxO6EVdx7UAg_l0bECQjc";
const CODE_CLUB = "MORFALOUS2026";

let sb = null;
try {
  if(!window.supabase || !window.supabase.createClient) throw new Error("Composant Supabase non chargé.");
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e){
  document.getElementById('app').innerHTML =
    `<div class="msg err show">${e.message} Recharge la page (Ctrl+Maj+R).</div>`;
}

const app = document.getElementById('app');

// Enregistrement du service worker (PWA installable)
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// ====== SPLASH SCREEN ======
const __splashStart = Date.now();
function hideSplash(){
  const sp = document.getElementById('splash');
  if(!sp) return;
  const wait = Math.max(0, 1800 - (Date.now() - __splashStart)); // durée mini ~1.8s
  setTimeout(()=>{ sp.classList.add('hide'); setTimeout(()=>sp.remove(), 500); }, wait);
}

// ====== INSTALLATION PWA ======
let __deferredPrompt = null;
let __installDismissed = (localStorage.getItem('installDismissed') === '1');
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  __deferredPrompt = e;
  renderInstallBanner();
});
window.addEventListener('appinstalled', ()=>{
  __deferredPrompt = null;
  localStorage.setItem('appInstalled', '1'); // on se souvient qu'elle est installée
  const b = document.getElementById('installBanner');
  if(b) b.remove();
});
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}
// vérifie si l'appli est déjà installée (API Chrome récente), puis cache la bannière
async function checkAlreadyInstalled(){
  if(navigator.getInstalledRelatedApps){
    try{
      const apps = await navigator.getInstalledRelatedApps();
      if(apps && apps.length){ localStorage.setItem('appInstalled','1'); }
    }catch(e){}
  }
}
function renderInstallBanner(){
  // ne pas afficher si : déjà fermée, déjà installée (mémorisée), ou lancée en mode appli
  if(__installDismissed || isStandalone() || localStorage.getItem('appInstalled')==='1') return;
  const host = document.getElementById('installSlot');
  if(!host) return; // l'écran courant n'a pas de slot
  if(document.getElementById('installBanner')) return;

  let inner;
  if(__deferredPrompt){
    // Android / Chrome desktop : bouton natif
    inner = `<div class="ib-ico">📲</div>
      <div class="ib-txt"><b>Installe l'appli sur ton téléphone</b><br>Accès direct depuis ton écran d'accueil, comme une vraie appli.</div>
      <button class="ib-btn" id="ibInstall">Installer</button>
      <button class="ib-close" id="ibClose" aria-label="Fermer">×</button>`;
  } else if(isIOS()){
    // iOS Safari : pas d'installation auto possible, on explique la méthode manuelle
    inner = `<div class="ib-ico">📲</div>
      <div class="ib-txt"><b>Installe l'appli sur ton iPhone</b><br>Dans Safari : bouton Partager, puis « Sur l'écran d'accueil ».</div>
      <button class="ib-btn" id="ibHelpIos">Comment ?</button>
      <button class="ib-close" id="ibClose" aria-label="Fermer">×</button>`;
  } else {
    return; // pas d'option d'install dispo
  }

  const b = document.createElement('div');
  b.id = 'installBanner';
  b.className = 'install-banner';
  b.innerHTML = inner;
  host.prepend(b);

  const inst = document.getElementById('ibInstall');
  if(inst) inst.onclick = async ()=>{
    if(!__deferredPrompt) return;
    __deferredPrompt.prompt();
    try{
      const choice = await __deferredPrompt.userChoice;
      if(choice && choice.outcome === 'accepted'){ localStorage.setItem('appInstalled','1'); }
    }catch(e){}
    __deferredPrompt = null;
    b.remove();
  };
  const close = document.getElementById('ibClose');
  if(close) close.onclick = ()=>{
    __installDismissed = true;
    localStorage.setItem('installDismissed', '1'); // on se souvient qu'elle a été fermée
    b.remove();
  };
  const helpIos = document.getElementById('ibHelpIos');
  if(helpIos) helpIos.onclick = showIosInstallHelp;
}

// Modale d'aide à l'installation iOS
function showIosInstallHelp(){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="modal">
      <div class="sec-title" style="font-size:17px">📲 Installer sur iPhone / iPad</div>
      <p class="sec-sub">Sur iPhone, l'installation se fait à la main (Apple ne permet pas le bouton automatique). C'est rapide :</p>
      <ol class="ios-steps">
        <li>Ouvre l'appli dans <b>Safari</b> (pas Chrome ni Firefox).</li>
        <li>Appuie sur le bouton <b>Partager</b> (le carré avec une flèche vers le haut), en bas de l'écran ou en haut à droite selon ton iPhone.</li>
        <li>Fais défiler et choisis <b>« Sur l'écran d'accueil »</b>.</li>
        <li>Appuie sur <b>Ajouter</b> en haut à droite.</li>
      </ol>
      <p class="sec-sub">L'icône Pronos MCM apparaîtra sur ton écran d'accueil, comme une vraie appli. 🐺</p>
      <div class="modal-actions">
        <button class="btn" id="iosOk" style="margin-top:0">C'est compris</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  document.getElementById('iosOk').onclick = ()=> ov.remove();
  ov.onclick = (e)=>{ if(e.target===ov) ov.remove(); };
}

// ====== ÉCRAN AUTH (connexion / inscription) ======
let mode = 'login';

function renderAuth(){
  teardownChat();
  // message de retour après confirmation d'email (redirigé depuis Supabase)
  let confirmBanner = '';
  const params = new URLSearchParams(window.location.search);
  const hash = window.location.hash || '';
  if(params.get('confirmed')==='1'){
    confirmBanner = `<div class="auth-success">✅ <b>Ton email est confirmé !</b> Tu peux maintenant te connecter. 🐺</div>`;
    mode = 'login';
  } else if(hash.includes('error') || params.get('error')){
    confirmBanner = `<div class="auth-error-banner">⚠️ Le lien de confirmation a expiré ou est invalide. Inscris-toi à nouveau ou demande un nouveau lien.</div>`;
  }
  app.innerHTML = `
    <div class="card">
      ${confirmBanner}
      <div class="tabs">
        <button class="tab ${mode==='login'?'active':''}" id="tabLogin">Se connecter</button>
        <button class="tab ${mode==='signup'?'active':''}" id="tabSignup">S'inscrire</button>
      </div>
      ${mode==='login' ? loginForm() : signupForm()}
      <div class="msg" id="msg"></div>
      <div class="auth-contact">Un souci pour t'inscrire ou te connecter ?<br><a href="mailto:mcmorfalous@gmail.com">Contacte le club</a></div>
    </div>
  `;
  document.getElementById('tabLogin').onclick = ()=>{ mode='login'; renderAuth(); };
  document.getElementById('tabSignup').onclick = ()=>{ mode='signup'; renderAuth(); };

  if(mode==='login'){
    document.getElementById('btnLogin').onclick = doLogin;
    document.getElementById('forgot').onclick = doForgot;
  } else {
    document.getElementById('btnSignup').onclick = doSignup;
  }
}

// ====== ACTIONS ======
async function doSignup(){
  const pseudo = val('su_pseudo'), prenom = val('su_prenom'), nom = val('su_nom');
  const email = val('su_email'), pwd = val('su_pwd'), code = val('su_code');

  if(code !== CODE_CLUB) return showMsg("Code club incorrect. Demande-le au club.", 'err');
  if(pseudo.length < 2) return showMsg("Choisis un pseudo d'au moins 2 caractères.", 'err');
  if(!email.includes('@')) return showMsg("Entre un email valide.", 'err');
  if(pwd.length < 6) return showMsg("Le mot de passe doit faire au moins 6 caractères.", 'err');

  const btn = document.getElementById('btnSignup');
  btn.disabled = true; showMsg("Création du compte…", 'ok');

  // créer le compte Auth en passant pseudo/nom/prénom en métadonnées.
  // Le profil est ensuite créé automatiquement côté base (trigger SQL).
  const { data, error } = await sb.auth.signUp({
    email, password: pwd,
    options: { data: { pseudo, nom, prenom } }
  });
  if(error){ btn.disabled=false; return showMsg(traduitErreur(error.message), 'err'); }

  // selon config Supabase, une confirmation email peut être requise
  if(data.session){
    boot(); // connecté direct (si confirmation désactivée)
  } else {
    showMsg("Compte créé ! Va confirmer ton email (mail de « Supabase », vérifie tes spams). Si la page affiche une erreur après le clic, c'est normal : reviens ici et connecte-toi.", 'ok');
    mode='login';
    setTimeout(renderAuth, 7000);
  }
}

async function doLogin(){
  const email = val('li_email'), pwd = val('li_pwd');
  if(!email || !pwd) return showMsg("Entre ton email et ton mot de passe.", 'err');
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; showMsg("Connexion…", 'ok');
  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if(error){ btn.disabled=false; return showMsg(traduitErreur(error.message), 'err'); }
  boot();
}

async function doForgot(){
  const email = val('li_email');
  if(!email) return showMsg("Entre d'abord ton email ci-dessus, puis reclique.", 'err');
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if(error) return showMsg(traduitErreur(error.message), 'err');
  showMsg("Email de réinitialisation envoyé (vérifie tes spams).", 'ok');
}

function traduitErreur(m){
  if(m.includes('already registered')) return "Cet email a déjà un compte. Connecte-toi.";
  if(m.includes('Invalid login')) return "Email ou mot de passe incorrect.";
  if(m.includes('Email not confirmed')) return "Ton email n'est pas encore confirmé. Clique sur le lien reçu par mail (vérifie tes spams), puis reconnecte-toi.";
  if(m.includes('rate limit')) return "Trop de tentatives, réessaie dans un moment.";
  return m;
}

function cats(){ return CHAMP_CATS[currentChamp] || ['450','250']; }
// classe CSS sûre à partir d'un nom de catégorie ("250 West" -> "250-West")
function catClass(cat){ return 'cat-' + String(cat||'').replace(/\s+/g,'-'); }
// libellé affiché d'une catégorie (le "250" de SX US = Showdown East+West)
function catLabel(cat){
  if(cat==='250' && currentChamp==='SXUS') return '250 Showdown';
  return cat;
}
// catégories présentes à une manche donnée (Vendée = variable, sinon toutes)
function mancheCats(manche){
  if(manche && Array.isArray(manche.categories) && manche.categories.length)
    return manche.categories;
  return cats();
}

// ----- PAGE D'ACCUEIL : choix du championnat -----
async function renderChampPicker(){
  const host = document.getElementById('homeContent');
  host.innerHTML = `<div class="home-loading">Chargement…</div>`;
  let counts={}, manches=[];
  try{
    const { data } = await sb.from('manches').select('id,championnat,nom,closes_at,annulee,ordre');
    manches=(data||[]).filter(m=>!m.annulee);
    manches.forEach(m=> counts[m.championnat]=(counts[m.championnat]||0)+1);
  }catch(e){}
  // état "terminé" des championnats
  try{
    const { data } = await sb.from('championnats_meta').select('championnat,termine');
    CHAMP_TERMINE = {}; (data||[]).forEach(r=>{ CHAMP_TERMINE[r.championnat]=!!r.termine; });
  }catch(e){}
  const metaFor = c => c==='MXdN' ? '1 épreuve' : c==='SMX' ? '3 playoffs' : `${counts[c]||0} manche${(counts[c]||0)>1?'s':''}`;

  // date de la dernière manche de chaque championnat (pour trier les fermés récent→ancien)
  const lastDate = {};
  manches.forEach(m=>{
    if(!m.closes_at) return;
    const t = new Date(m.closes_at).getTime();
    if(!lastDate[m.championnat] || t > lastDate[m.championnat]) lastDate[m.championnat] = t;
  });
  // ordre d'affichage : ouverts d'abord (dans l'ordre CHAMPS), puis fermés du + récemment fermé au + ancien
  const orderedChamps = CHAMPS.slice().sort((a,b)=>{
    const da = !!CHAMP_TERMINE[a], db = !!CHAMP_TERMINE[b];
    if(da !== db) return da ? 1 : -1;          // ouverts avant fermés
    if(da && db) return (lastDate[b]||0) - (lastDate[a]||0); // fermés : récent d'abord
    return CHAMPS.indexOf(a) - CHAMPS.indexOf(b); // ouverts : ordre naturel
  });

  // rappel : manches qui ferment dans moins de 12h
  const now=Date.now(), H12=12*3600*1000;
  const soon = manches
    .filter(m=> m.closes_at && (new Date(m.closes_at).getTime()-now)>0 && (new Date(m.closes_at).getTime()-now)<=H12)
    .sort((a,b)=> new Date(a.closes_at)-new Date(b.closes_at));
  let alertHtml='';
  if(soon.length){
    const champs=[...new Set(soon.map(m=>CHAMP_LABELS[m.championnat]||m.championnat))];
    alertHtml = `<div class="home-alert">
      <span class="ha-ico">⚠️</span>
      <div class="ha-body">
        <span class="ha-title">Ça ferme bientôt !</span>
        <span class="ha-sub">${soon.length} manche${soon.length>1?'s':''} ferme${soon.length>1?'nt':''} dans moins de 12h · ${champs.join(', ')}</span>
      </div>
    </div>`;
  }

  // En bref : résumé (2 actus max)
  let brefHtml = `<button class="home-bref" data-act="enbref">
      <div class="hb-head"><span class="hb-ico">📰</span><span class="hb-title">En bref</span><span class="hb-more">Tout voir →</span></div>
      <div class="hb-list" id="hbList"><div class="hb-empty">Chargement…</div></div>
    </button>`;

  // en-tête héro tout en haut (au-dessus du Salut/burger)
  const heroSlot = document.getElementById('heroSlot');
  if(heroSlot){
    heroSlot.innerHTML = `
      <div class="home-hero">
        <div class="hero-logo"><img src="splash-logo.png" alt="MC Les Morfalous"></div>
        <div class="hero-titles">
          <div class="hero-kicker">MC Les Morfalous</div>
          <h1 class="hero-title">PRONOS<span>MOTOCROSS</span></h1>
        </div>
      </div>`;
  }

  host.innerHTML = `
    ${alertHtml}
    ${brefHtml}
    <div class="home-section-lbl">Choisis ton championnat <span class="hsl-saison">· Saison 2026</span></div>
    <div class="champ-cards">
      ${orderedChamps.map((c,i)=>`
        <button class="champ-card ${CHAMP_TERMINE[c]?'is-done':''}" data-champ="${c}" style="animation-delay:${i*0.07}s">
          ${CHAMP_TERMINE[c]?'<span class="cc-done">Terminé</span>':''}
          <span class="cc-pastille" style="background:${CHAMP_LOGO_BG[c]||'#fff'}">${CHAMP_LOGOS[c]?`<img src="${CHAMP_LOGOS[c]}" alt="${CHAMP_LABELS[c]}">`:`<span class="cc-emoji">${CHAMP_ICONS[c]||''}</span>`}</span>
          <span class="cc-name">${CHAMP_LABELS[c]||c}</span>
          <span class="cc-meta">${metaFor(c)}</span>
        </button>`).join('')}
    </div>
  `;
  const enter = (champ)=>{
    const sh=document.getElementById('scrollHint'); if(sh) sh.remove();
    currentChamp=champ; PILOTES={}; CHAMP_CLOSES_LOADED_FOR=null;
    inChampScreen=true; currentView='pronos'; renderShell(); checkAlerts();
  };
  host.querySelectorAll('.champ-card').forEach(b=> b.onclick = ()=> enter(b.dataset.champ));
  // flèche "il y a plus de championnats en bas" (disparaît quand on atteint le bas)
  setupScrollHint();
  const brefBtn = host.querySelector('.home-bref');
  if(brefBtn) brefBtn.onclick = ()=> openGlobalView('enbref');

  // remplir le résumé En bref
  computeActus().then(({home})=>{
    const list=document.getElementById('hbList'); if(!list) return;
    if(!home.length){ list.innerHTML=`<div class="hb-empty">Pas encore d'actu — reviens après les prochains résultats !</div>`; return; }
    list.innerHTML = home.map(a=>{
      const t=actuText(a);
      return `<div class="hb-item"><span class="hb-iico">${t.ico}</span><span class="hb-itxt">${t.html}</span></div>`;
    }).join('');
  });
}

// flèche flottante en bas de l'accueil qui indique qu'on peut scroller pour voir plus de championnats
function setupScrollHint(){
  // retirer une éventuelle flèche existante
  const old = document.getElementById('scrollHint'); if(old) old.remove();
  const hint = document.createElement('div');
  hint.id = 'scrollHint';
  hint.className = 'scroll-hint';
  hint.innerHTML = '⌄';
  document.body.appendChild(hint);

  const update = ()=>{
    // si on n'est plus sur l'accueil, retirer la flèche
    if(inChampScreen){ hint.remove(); window.removeEventListener('scroll', update); return; }
    const scrollable = document.documentElement.scrollHeight - window.innerHeight;
    const atBottom = window.scrollY >= scrollable - 30;
    // afficher seulement s'il y a de quoi scroller et qu'on n'est pas en bas
    hint.style.opacity = (scrollable > 60 && !atBottom) ? '1' : '0';
  };
  window.addEventListener('scroll', update, { passive:true });
  setTimeout(update, 120);
}

  const smxInfo = (currentChamp==='SMX') ? `

      <p class="smx-dates"><b>Playoff 1</b> · 12 sept &nbsp;—&nbsp; <b>Playoff 2</b> · 19 sept &nbsp;—&nbsp; <b>Final</b> · 26 sept</p>
    </div>` : '';
  host.innerHTML = `
    <div class="champ-switch-wrap">
      <div class="champ-switch" id="champSwitch">
        ${CHAMPS.map(c=>`<button class="champ-btn ${c===currentChamp?'active':''}" data-champ="${c}"><span class="champ-pastille" style="background:${CHAMP_LOGO_BG[c]||'#fff'}">${CHAMP_LOGOS[c]?`<img src="${CHAMP_LOGOS[c]}" alt="${CHAMP_LABELS[c]}">`:`<span class="champ-ico">${CHAMP_ICONS[c]||''}</span>`}</span><span class="champ-lbl">${CHAMP_LABELS[c]||c}</span></button>`).join('')}
      </div>
      <span class="switch-fade" id="switchFade">›</span>
    </div>
    ${smxInfo}
    <nav class="nav" id="nav">
      <button class="nav-btn play ${currentView==='pronos'?'active':''}" data-view="pronos"><span class="nav-ico">🏁</span>Jouer</button>
      <button class="nav-btn ${currentView==='mespronos'?'active':''}" data-view="mespronos">Mes pronos</button>
      <button class="nav-btn ${currentView==='classement'?'active':''}" data-view="classement">Classement</button>
    </nav>
  `;
  // centrer le championnat actif dans la barre + masquer la flèche quand on arrive au bout
  const sw = document.getElementById('champSwitch');
  const fade = document.getElementById('switchFade');
  if(sw){
    const act = sw.querySelector('.champ-btn.active');
    if(act) act.scrollIntoView({inline:'center', block:'nearest'});
    const updateFade = ()=>{
      if(!fade) return;
      const atEnd = sw.scrollLeft + sw.clientWidth >= sw.scrollWidth - 4;
      fade.style.opacity = atEnd ? '0' : '1';
    };
    sw.addEventListener('scroll', updateFade);
    setTimeout(updateFade, 60);
  }
  host.querySelectorAll('.champ-btn').forEach(b=>{
    b.onclick = ()=>{
      currentChamp = b.dataset.champ;
      PILOTES = {}; CHAMP_CLOSES_LOADED_FOR = null;
      // maj le libellé retour
      const bh=document.getElementById('backHome'); if(bh) bh.innerHTML=`← <b>${CHAMP_LABELS[currentChamp]||''}</b>`;
      // régénérer tout le contenu du championnat (barre, encadré SMX, nav, vue)
      renderChampInner();
      checkAlerts();
    };
  });
  host.querySelectorAll('.nav-btn').forEach(b=>{
    b.onclick = ()=>{
      currentView = b.dataset.view;
      host.querySelectorAll('.nav-btn').forEach(x=>x.classList.toggle('active', x.dataset.view===currentView));
      switchView(currentView);
    };
  });
  switchView(currentView);
  checkAlerts();
}
