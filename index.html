// ====== VUE MES STATS (avec comparateur) ======
let _statsData = null; // cache des datasets pour le comparateur

function computeStatsFor(uid, D){
  const { mById, validM, resByKey, pidName, pronos, resultats, profils } = D;
  const mine = pronos.filter(pr=> pr.user_id===uid && validM.has(pr.manche_id));
  let totalPts=0, nbScored=0, nbPlayed=mine.length, parfaits=0, cinqTrouves=0;
  let best={pts:-Infinity, manche:null};
  const ptsByPilote={}, perManche={};
  mine.forEach(pr=>{
    const res=resByKey[pr.manche_id+'-'+pr.categorie];
    if(!res) return;
    const bd=scoreBreakdown(pr,res); if(!bd) return;
    totalPts+=bd.total; nbScored++;
    if(bd.parfait) parfaits++;
    if(bd.double5) cinqTrouves++;
    const m=mById[pr.manche_id], key=pr.manche_id;
    perManche[key]=perManche[key]||{pts:0, nom:m?m.nom:'?', champ:m?m.championnat:''};
    perManche[key].pts+=bd.total;
    if(bd.total>0){
      [pr.p1_pilote_id,pr.p2_pilote_id,pr.p3_pilote_id].forEach(id=>{
        if(id && [res.p1_pilote_id,res.p2_pilote_id,res.p3_pilote_id].includes(id))
          ptsByPilote[id]=(ptsByPilote[id]||0)+bd.total/3;
      });
    }
  });
  Object.values(perManche).forEach(pm=>{ if(pm.pts>best.pts) best={pts:pm.pts, manche:pm}; });
  const moyenne = nbScored>0 ? (totalPts/nbScored) : null;
  const pbEntries=Object.entries(ptsByPilote).sort((a,b)=>b[1]-a[1]);
  const porteBonheur = pbEntries.length ? (pidName[pbEntries[0][0]]||'—') : '—';
  // place + total cumulé
  const totals={}; profils.forEach(p=>totals[p.id]=0);
  pronos.forEach(pr=>{ const res=resByKey[pr.manche_id+'-'+pr.categorie];
    if(res && totals[pr.user_id]!==undefined) totals[pr.user_id]+=scoreManche(pr,res); });
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const place=sorted.findIndex(e=>e[0]===uid)+1;
  return {
    place, nbJoueurs:sorted.length, total: totals[uid]||0,
    moyenne, nbPlayed, parfaits, cinqTrouves,
    best, porteBonheur, hasResults: resultats.length>0
  };
}

async function renderMesStats(v){
  v.innerHTML = `<div class="card"><div class="loading">Calcul de tes stats…</div></div>`;
  const myUid = currentSession.user.id;
  const [pilotesR, manchesR, pronosR, resultatsR, profilsR] = await Promise.all([
    sb.from('pilotes').select('id,nom,numero,championnat'),
    sb.from('manches').select('id,championnat,annulee,ordre,nom'),
    sb.from('pronos').select('*'),
    sb.from('resultats').select('*'),
    sb.from('profils').select('id,pseudo,avatar')
  ]);
  const pilotes=pilotesR.data||[], manches=manchesR.data||[], pronos=pronosR.data||[],
        resultats=resultatsR.data||[], profils=profilsR.data||[];
  const mById={}; manches.forEach(m=> mById[m.id]=m);
  const validM = new Set(manches.filter(m=>!m.annulee).map(m=>m.id));
  const resByKey={}; resultats.forEach(r=>{ if(validM.has(r.manche_id)) resByKey[r.manche_id+'-'+r.categorie]=r; });
  const pidName={}; pilotes.forEach(p=> pidName[p.id]=(p.championnat==='MXdN')?p.nom:`${p.nom}${p.numero?` #${p.numero}`:''}`);
  _statsData = { mById, validM, resByKey, pidName, pronos, resultats, profils };

  const me = computeStatsFor(myUid, _statsData);
  const myPseudoName = (profils.find(p=>p.id===myUid)||{}).pseudo || 'Moi';

  const placeStr = (me.place>0 && me.hasResults)?`${me.place}${me.place===1?'er':'e'} / ${me.nbJoueurs}`:'—';
  const moyStr = me.moyenne!=null ? me.moyenne.toFixed(1) : '—';
  const bestStr = me.best.manche ? `${me.best.pts>0?'+':''}${me.best.pts} pts` : '—';
  const bestSub = me.best.manche ? `${me.best.manche.nom} · ${CHAMP_LABELS[me.best.manche.champ]||me.best.manche.champ}` : 'aucune manche notée';

  // options du sélecteur de comparaison (autres joueurs)
  const others = profils.filter(p=>p.id!==myUid).sort((a,b)=>(a.pseudo||'').localeCompare(b.pseudo||''));
  const opts = `<option value="">— Choisis un joueur —</option>`
    + `<option value="__avg__">⌀ Moyenne du club</option>`
    + others.map(p=>`<option value="${p.id}">${p.pseudo}</option>`).join('');

  v.innerHTML = `
    <div class="card">
      <div class="sec-title">📊 Mes stats</div>
      <div class="pf-stats-grid">
        <div class="pf-stat hl"><div class="pfv">${placeStr}</div><div class="pfl">Classement général</div></div>
        <div class="pf-stat"><div class="pfv">${me.total}</div><div class="pfl">Points cumulés</div></div>
        <div class="pf-stat"><div class="pfv">${moyStr}</div><div class="pfl">Moy. / manche</div></div>
        <div class="pf-stat"><div class="pfv">${me.nbPlayed}</div><div class="pfl">Pronos joués</div></div>
        <div class="pf-stat"><div class="pfv pfv-gold">${me.parfaits}</div><div class="pfl">Podiums parfaits</div></div>
        <div class="pf-stat"><div class="pfv pfv-gold">${me.cinqTrouves}</div><div class="pfl">5e trouvées</div></div>
      </div>
      <div class="pf-stat-row"><span class="pfl">🏆 Meilleure manche</span><span class="pf-rowval">${bestStr}<small>${bestSub}</small></span></div>
      <div class="pf-stat-row"><span class="pfl">🍀 Pilote porte-bonheur</span><span class="pf-rowval pf-pilote">${me.porteBonheur}</span></div>
    </div>

    <div class="card">
      <div class="sec-title" style="font-size:16px">⚔️ Me comparer</div>
      <p class="sec-sub">Compare-toi à un autre joueur ou à la moyenne du club.</p>
      <select id="cmpSelect" class="cmp-select">${opts}</select>
      <div id="cmpResult"></div>
    </div>
  `;

  document.getElementById('cmpSelect').onchange = (e)=>{
    const val = e.target.value;
    const box = document.getElementById('cmpResult');
    if(!val){ box.innerHTML=''; return; }
    let other, otherName;
    if(val==='__avg__'){
      // moyenne du club (tous les autres joueurs)
      const all = profils.map(p=> computeStatsFor(p.id, _statsData));
      const avg = (sel)=> { const vals=all.map(sel).filter(x=>x!=null && isFinite(x)); return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : null; };
      other = {
        total: Math.round(avg(s=>s.total)),
        moyenne: avg(s=>s.moyenne),
        nbPlayed: Math.round(avg(s=>s.nbPlayed)),
        parfaits: (avg(s=>s.parfaits)||0),
        cinqTrouves: (avg(s=>s.cinqTrouves)||0),
        place:0, best:{manche:null}, porteBonheur:'—'
      };
      otherName = 'Moyenne du club';
    } else {
      other = computeStatsFor(val, _statsData);
      otherName = (profils.find(p=>p.id===val)||{}).pseudo || 'Joueur';
    }
    box.innerHTML = renderCompare(myPseudoName, me, otherName, other);
  };
}

// rend la comparaison côte à côte
function renderCompare(nameA, A, nameB, B){
  const fmt = (v,dec=0)=> (v==null||!isFinite(v))?'—':(dec?(+v).toFixed(dec):Math.round(v));
  const row = (label, a, b, higherBetter=true, dec=0)=>{
    const av=(a==null||!isFinite(a))?null:+a, bv=(b==null||!isFinite(b))?null:+b;
    let aCls='', bCls='';
    if(av!=null && bv!=null && av!==bv){
      const aWins = higherBetter ? av>bv : av<bv;
      aCls = aWins?'cmp-win':''; bCls = aWins?'':'cmp-win';
    }
    return `<div class="cmp-row">
      <span class="cmp-a ${aCls}">${fmt(a,dec)}</span>
      <span class="cmp-lbl">${label}</span>
      <span class="cmp-b ${bCls}">${fmt(b,dec)}</span>
    </div>`;
  };
  return `
    <div class="cmp-head">
      <span class="cmp-name">${nameA}</span>
      <span class="cmp-vs">VS</span>
      <span class="cmp-name">${nameB}</span>
    </div>
    ${row('Points cumulés', A.total, B.total, true)}
    ${row('Moy. / manche', A.moyenne, B.moyenne, true, 1)}
    ${row('Pronos joués', A.nbPlayed, B.nbPlayed, true)}
    ${row('Podiums parfaits', A.parfaits, B.parfaits, true)}
    ${row('5e trouvées', A.cinqTrouves, B.cinqTrouves, true)}
  `;
}

// ====== EN BREF (actus du club générées) ======
let _actusCache = null;

// charge les données et génère la liste d'actus (faits marquants)
async function computeActus(){
  const [pilotesR, manchesR, pronosR, resultatsR, profilsR] = await Promise.all([
    sb.from('pilotes').select('id,nom,numero,championnat'),
    sb.from('manches').select('id,championnat,annulee,ordre,nom,closes_at'),
    sb.from('pronos').select('*'),
    sb.from('resultats').select('*'),
    sb.from('profils').select('id,pseudo,avatar')
  ]);
  const pilotes=pilotesR.data||[], manches=manchesR.data||[], pronos=pronosR.data||[],
        resultats=resultatsR.data||[], profils=profilsR.data||[];
  profils.forEach(p=>{ if(p.avatar) AVATARS[p.id]=p.avatar; });
  const pseudoById={}; profils.forEach(p=> pseudoById[p.id]=p.pseudo||'Joueur');
  const mById={}; manches.forEach(m=> mById[m.id]=m);
  const validM=new Set(manches.filter(m=>!m.annulee).map(m=>m.id));
  const resByKey={}; resultats.forEach(r=>{ if(validM.has(r.manche_id)) resByKey[r.manche_id+'-'+r.categorie]=r; });

  // manches fermées AVEC résultat, triées de la plus récente à la plus ancienne (par ordre desc + champ)
  const closedWithRes = manches
    .filter(m=>!m.annulee && resultats.some(r=>r.manche_id===m.id))
    .sort((a,b)=> (b.ordre-a.ordre));

  const actus=[];

  // pour chaque manche récente (on se limite aux 2 plus récentes pour rester "actu")
  closedWithRes.slice(0,2).forEach(m=>{
    const champLbl=CHAMP_LABELS[m.championnat]||m.championnat;
    // scores de tous les joueurs sur cette manche (cumul catégories)
    const perUser={};
    pronos.filter(pr=> pr.manche_id===m.id).forEach(pr=>{
      const res=resByKey[pr.manche_id+'-'+pr.categorie]; if(!res) return;
      const bd=scoreBreakdown(pr,res); if(!bd) return;
      perUser[pr.user_id]=(perUser[pr.user_id]||0)+bd.total;
      // bonus 5e réussi / raté
      if(bd.double5) actus.push({type:'cinq_ok', uid:pr.user_id, manche:m.nom, champ:champLbl, cat:pr.categorie, ordre:m.ordre});
      else if(bd.malus5) actus.push({type:'cinq_ko', uid:pr.user_id, manche:m.nom, champ:champLbl, cat:pr.categorie, ordre:m.ordre});
      // podium parfait
      if(bd.parfait) actus.push({type:'parfait', uid:pr.user_id, manche:m.nom, champ:champLbl, cat:pr.categorie, ordre:m.ordre});
    });
    // meilleur score de la manche
    const best=Object.entries(perUser).sort((a,b)=>b[1]-a[1])[0];
    if(best && best[1]>0){
      actus.push({type:'top_score', uid:best[0], pts:best[1], manche:m.nom, champ:champLbl, ordre:m.ordre});
    }
  });

  // attacher pseudo
  actus.forEach(a=> a.pseudo = pseudoById[a.uid]||'Joueur');
  // ordre : manche la plus récente d'abord, puis priorité parfait > 5e > top score
  const prio={parfait:0, cinq_ok:1, cinq_ko:2, top_score:3};
  actus.sort((a,b)=> (b.ordre-a.ordre) || (prio[a.type]-prio[b.type]));
  _actusCache = actus;
  return actus;
}

// transforme une actu en texte + icône
function actuText(a){
  switch(a.type){
    case 'top_score': return {ico:'🔥', html:`<b>${a.pseudo}</b> a marqué <b>${a.pts} pts</b> sur ${a.manche} <span class="ac-champ">${a.champ}</span>`};
    case 'parfait':   return {ico:'🎯', html:`<b>${a.pseudo}</b> a réussi un <b>podium parfait</b> (${a.cat}) sur ${a.manche} <span class="ac-champ">${a.champ}</span>`};
    case 'cinq_ok':   return {ico:'⭐', html:`<b>${a.pseudo}</b> a <b>doublé ses points</b> avec la 5e place (${a.cat}) sur ${a.manche} <span class="ac-champ">${a.champ}</span>`};
    case 'cinq_ko':   return {ico:'💔', html:`<b>${a.pseudo}</b> a tenté la 5e place (${a.cat}) et perdu 5 pts sur ${a.manche} <span class="ac-champ">${a.champ}</span>`};
    default: return {ico:'•', html:''};
  }
}

async function renderEnBref(v){
  v.innerHTML = `<div class="card"><div class="loading">Chargement des actus…</div></div>`;
  const actus = await computeActus();
  if(!actus.length){
    v.innerHTML = `<div class="card">
      <div class="sec-title">📰 En bref</div>
      <div class="cl-empty">Pas encore d'actu.<br>Les faits marquants apparaîtront ici dès les premiers résultats. 🐺</div>
    </div>`;
    return;
  }
  const rows = actus.map(a=>{
    const t=actuText(a);
    const av = `<span class="ac-ava" style="background:${avatarBg(a.uid,a.pseudo)}">${avatarInner(a.uid,a.pseudo)}</span>`;
    return `<div class="ac-row">${av}<span class="ac-ico">${t.ico}</span><span class="ac-txt">${t.html}</span></div>`;
  }).join('');
  v.innerHTML = `<div class="card">
    <div class="sec-title">📰 En bref</div>
    <p class="sec-sub">Les derniers faits marquants du club.</p>
    ${rows}
  </div>`;
}

// ====== VUE MES PRONOS ======
async function renderMesPronos(v){
  v.innerHTML = `<div class="card"><div class="loading">Chargement de tes pronostics…</div></div>`;
  await loadPilotes();
  const uid = currentSession.user.id;

  const [pronosR, manchesR, pchampR, resultatsR, allPronosR, allProfilsR, allPchampR, rchampR] = await Promise.all([
    sb.from('pronos').select('*').eq('user_id', uid),
    sb.from('manches').select('*').eq('championnat', currentChamp).order('ordre'),
    sb.from('pronos_championnat').select('*').eq('user_id', uid).eq('championnat', currentChamp),
    sb.from('resultats').select('*'),
    sb.from('pronos').select('*'),
    sb.from('profils').select('id,pseudo,avatar'),
    sb.from('pronos_championnat').select('*'),
    sb.from('resultat_championnat').select('*'),
  ]);
  const manches = manchesR.data||[];
  const pchamp = pchampR.data||[];
  const resultats = (resultatsR.data||[]);

  // ids des manches du championnat courant (pour filtrer pronos/résultats)
  const mancheIds = new Set(manches.filter(m=>!m.annulee).map(m=>m.id));
  const pronos = (pronosR.data||[]).filter(pr=> mancheIds.has(pr.manche_id));

  // index pilote id -> "nom (#num)"
  const pidName = {};
  allPilotes().forEach(p=> pidName[p.id] = `${p.nom}${p.numero?` #${p.numero}`:''}`);

  // ===== STATS PERSO =====
  const resByKey={}; resultats.filter(r=>mancheIds.has(r.manche_id)).forEach(r=> resByKey[r.manche_id+'-'+r.categorie]=r);

  // 1) moyenne de points par manche (sur mes pronos qui ont un résultat)
  let totalPts=0, nbScored=0;
  const ptsByPilote={};
  pronos.forEach(pr=>{
    const res=resByKey[pr.manche_id+'-'+pr.categorie];
    if(!res) return;
    const gain=scoreManche(pr,res);
    totalPts+=gain; nbScored++;
    // pilote porte-bonheur : pilotes bien pronostiqués qui ont rapporté
    if(gain>0){
      [pr.p1_pilote_id,pr.p2_pilote_id,pr.p3_pilote_id].forEach(id=>{
        if(id && [res.p1_pilote_id,res.p2_pilote_id,res.p3_pilote_id].includes(id))
          ptsByPilote[id]=(ptsByPilote[id]||0)+gain/3;
      });
    }
  });
  const moyenne = nbScored>0 ? (totalPts/nbScored).toFixed(1) : '—';

  // 2) pilote porte-bonheur
  let porteBonheur='—';
  const pbEntries=Object.entries(ptsByPilote).sort((a,b)=>b[1]-a[1]);
  if(pbEntries.length) porteBonheur = pidName[pbEntries[0][0]]||'—';

  // 3) ma place au classement général (du championnat courant)
  const allPronos=(allPronosR.data||[]).filter(pr=> mancheIds.has(pr.manche_id));
  const allProfils=allProfilsR.data||[];
  const allPchamp=(allPchampR.data||[]).filter(pc=> pc.championnat===currentChamp);
  const rchamp=(rchampR.data||[]).filter(r=> r.championnat===currentChamp);
  const rchampByCat={}; rchamp.forEach(r=>rchampByCat[r.categorie]=r);
  const totals={}; allProfils.forEach(p=>totals[p.id]=0);
  allPronos.forEach(pr=>{ const res=resByKey[pr.manche_id+'-'+pr.categorie]; if(res&&totals[pr.user_id]!==undefined) totals[pr.user_id]+=scoreManche(pr,res); });
  allPchamp.forEach(pc=>{ const res=rchampByCat[pc.categorie]; if(res&&pc.valide&&totals[pc.user_id]!==undefined) totals[pc.user_id]+=scoreChamp(pc,res); });
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const maPlace = sorted.findIndex(e=>e[0]===uid)+1;
  const nbJoueurs = sorted.length;
  const placeStr = (maPlace>0 && resultats.length>0) ? `${maPlace}${maPlace===1?'er':'e'} / ${nbJoueurs}` : '—';

  const statsPerso = `
    <div class="perso-stats">
      <div class="ps-item"><div class="ps-val">${placeStr}</div><div class="ps-lab">Classement général</div></div>
      <div class="ps-item"><div class="ps-val">${moyenne}</div><div class="ps-lab">Moy. pts / manche</div></div>
      <div class="ps-item"><div class="ps-val ps-pilote">${porteBonheur}</div><div class="ps-lab">Pilote porte-bonheur</div></div>
    </div>
  `;

  // regrouper pronos par manche
  const byManche = {};
  pronos.forEach(pr=>{ (byManche[pr.manche_id]=byManche[pr.manche_id]||[]).push(pr); });

  const mancheCards = manches
    .filter(m=> byManche[m.id])
    .slice().reverse()
    .map(m=>{
      const closed = isClosed(m);
      const cats = byManche[m.id].sort((a,b)=> b.categorie.localeCompare(a.categorie));
      const podiums = cats.map(pr=>{
        const l1 = pidName[pr.p1_pilote_id]||'?';
        const l2 = pidName[pr.p2_pilote_id]||'?';
        const l3 = pidName[pr.p3_pilote_id]||'?';
        const l5 = pr.joue_bonus5 ? (pidName[pr.p5_pilote_id]||'?') : null;
        // détail des points si la manche est fermée
        let scoreLine = '';
        const res = resByKey[pr.manche_id+'-'+pr.categorie];
        if(closed){
          if(res){
            const b = scoreBreakdown(pr, res);
            const totCls = b.total>0 ? '' : (b.total<0 ? 'neg' : 'zero');
            const parts = [`${b.base} pt${b.base>1?'s':''} podium`];
            if(b.parfait) parts.push(`<span class="ms-bonus">+${b.parfait} podium parfait</span>`);
            if(b.joue5){
              if(b.double5) parts.push(`<span class="ms-bonus">5e trouvé ×2 (+${b.bonus5})</span>`);
              else parts.push(`<span class="ms-malus">5e raté −5</span>`);
            }
            scoreLine = `<div class="mp-score">
              <span class="ms-tot ${totCls}">${b.total>0?'+':''}${b.total} pt${Math.abs(b.total)>1?'s':''}</span>
              <span class="ms-detail">${parts.join(' · ')}</span>
            </div>`;
          } else {
            scoreLine = `<div class="mp-score"><span class="ms-pending">⏳ Résultat pas encore saisi</span></div>`;
          }
        }
        return `<div class="mp-cat">
          <span class="cat-tag cat-${pr.categorie}">${pr.categorie}</span>
          <span class="mp-podium">🥇 ${l1} · 🥈 ${l2} · 🥉 ${l3}${l5?` · 5e ${l5}`:''}</span>
        </div>${scoreLine}`;
      }).join('');
      return `<div class="mp-manche">
        <div class="mp-head">
          <span class="mp-nom">${m.nom}</span>
          <span class="mp-status ${closed?'closed':'open'}">${closed?'🔒 fermé':'modifiable'}</span>
        </div>
        ${podiums}
        <div class="mp-actions">
          <button class="mp-edit" data-manche="${m.id}">${closed?'Voir':'Modifier'}</button>
          ${closed?'':`<button class="mp-del" data-manche="${m.id}">Supprimer</button>`}
        </div>
      </div>`;
    }).join('');

  // championnat
  let champCard = '';
  if(pchamp.length){
    const cats = pchamp.sort((a,b)=> b.categorie.localeCompare(a.categorie));
    const blocks = cats.map(pc=>{
      const l1=pidName[pc.p1_pilote_id]||'?', l2=pidName[pc.p2_pilote_id]||'?', l3=pidName[pc.p3_pilote_id]||'?';
      const l5= pc.joue_bonus5 ? (pidName[pc.p5_pilote_id]||'?') : null;
      return `<div class="mp-cat"><span class="cat-tag cat-${pc.categorie}">${pc.categorie}</span>
        <span class="mp-podium">🥇 ${l1} · 🥈 ${l2} · 🥉 ${l3}${l5?` · 5e ${l5}`:''}</span></div>`;
    }).join('');
    champCard = `<div class="mp-manche champ">
      <div class="mp-head"><span class="mp-nom">🏆 Championnat</span>
        <span class="mp-status ${pchamp[0].valide?'closed':'open'}">${pchamp[0].valide?'🔒 validé':'brouillon'}</span></div>
      ${blocks}
    </div>`;
  }

  const hasAny = mancheCards || champCard;
  v.innerHTML = `
    <div class="card">
      <div class="sec-title">Mes pronostics</div>
      <p class="sec-sub">Retrouve tous tes pronos ici. Tu peux les modifier ou les supprimer tant que la manche est ouverte.</p>
      ${resultats.length>0 ? statsPerso : ''}
      ${hasAny ? mancheCards + champCard
        : '<div class="placeholder">Aucun pronostic pour le moment. Rends-toi dans l onglet Pronos pour commencer !</div>'}
    </div>
  `;
  // actions
  v.querySelectorAll('.mp-edit').forEach(b=>{
    b.onclick = ()=> openMancheProno(+b.dataset.manche, manches.find(m=>m.id==b.dataset.manche));
  });
  v.querySelectorAll('.mp-del').forEach(b=>{
    b.onclick = ()=> deleteMancheProno(+b.dataset.manche, manches.find(m=>m.id==b.dataset.manche));
  });
}

async function deleteMancheProno(mancheId, manche){
  if(isClosed(manche)){ alert("Cette manche est fermée, le prono ne peut plus être supprimé."); return; }
  if(!confirm(`Supprimer ton pronostic pour ${manche.nom} ? Cette action est définitive.`)) return;
  const { error } = await sb.from('pronos').delete()
    .eq('user_id', currentSession.user.id).eq('manche_id', mancheId);
  if(error){ alert("Erreur : "+error.message); return; }
  renderMesPronos(document.getElementById('view'));
}

// ====== MOTEUR DE POINTS ======
function scoreManche(prono, resultat){
  if(!prono || !resultat) return 0;
  const reel = [resultat.p1_pilote_id, resultat.p2_pilote_id, resultat.p3_pilote_id];
  const mien = [prono.p1_pilote_id, prono.p2_pilote_id, prono.p3_pilote_id];
  let bien=0, bons=0;
  mien.forEach((pid,i)=>{ if(pid && pid===reel[i]) bien++; });
  mien.forEach(pid=>{ if(pid && reel.includes(pid)) bons++; });
  let pts=0;
  if(bons===3) pts = (bien===3)?15:12;
  else if(bons===2) pts = (bien===2)?10:(bien===1?9:8);
  else if(bons===1) pts = (bien===1)?5:3;
  // bonus podium parfait : +3 (appliqué avant le bonus 5e)
  if(bons===3 && bien===3) pts += 3;
  if(prono.joue_bonus5){
    if(prono.p5_pilote_id && resultat.p5_pilote_id && prono.p5_pilote_id===resultat.p5_pilote_id) pts*=2;
    else pts-=5;
  }
  return pts;
}
// détail lisible du score d'une manche (base, podium parfait, bonus/malus 5e)
function scoreBreakdown(prono, resultat){
  if(!prono || !resultat) return null;
  const reel = [resultat.p1_pilote_id, resultat.p2_pilote_id, resultat.p3_pilote_id];
  const mien = [prono.p1_pilote_id, prono.p2_pilote_id, prono.p3_pilote_id];
  let bien=0, bons=0;
  mien.forEach((pid,i)=>{ if(pid && pid===reel[i]) bien++; });
  mien.forEach(pid=>{ if(pid && reel.includes(pid)) bons++; });
  let base=0;
  if(bons===3) base = (bien===3)?15:12;
  else if(bons===2) base = (bien===2)?10:(bien===1?9:8);
  else if(bons===1) base = (bien===1)?5:3;
  let parfait=0;
  if(bons===3 && bien===3) parfait = 3;
  let avant5 = base + parfait;
  let bonus5=0, malus5=false, double5=false;
  if(prono.joue_bonus5){
    if(prono.p5_pilote_id && resultat.p5_pilote_id && prono.p5_pilote_id===resultat.p5_pilote_id){
      double5=true; bonus5 = avant5; // doublé => on gagne autant en plus
    } else { malus5=true; bonus5 = -5; }
  }
  const total = avant5 + bonus5;
  return { bons, bien, base, parfait, avant5, joue5:!!prono.joue_bonus5, double5, malus5, bonus5, total };
}
function scoreChamp(prono, resultat){
  if(!prono || !resultat) return 0;
  const reel = [resultat.p1_pilote_id, resultat.p2_pilote_id, resultat.p3_pilote_id];
  const mien = [prono.p1_pilote_id, prono.p2_pilote_id, prono.p3_pilote_id];
  let bien=0, bons=0;
  mien.forEach((pid,i)=>{ if(pid && pid===reel[i]) bien++; });
  mien.forEach(pid=>{ if(pid && reel.includes(pid)) bons++; });
  let pts=0;
  if(bons===3) pts=(bien===3)?30:24;
  else if(bons===2) pts=(bien===2)?20:(bien===1?18:16);
  else if(bons===1) pts=(bien===1)?10:6;
  // bonus podium parfait championnat : +5 (appliqué avant le bonus 5e)
  if(bons===3 && bien===3) pts += 5;
  if(prono.joue_bonus5){
    if(prono.p5_pilote_id && resultat.p5_pilote_id && prono.p5_pilote_id===resultat.p5_pilote_id) pts*=3;
    else pts-=15;
  }
  return pts;
}

async function renderClassement(v){
  v.innerHTML = `<div class="card"><div class="loading">Calcul des classements…</div></div>`;

  // tout charger
  const [profilsR, pronosR, resultatsR, pchampR, rchampR, manchesR] = await Promise.all([
    sb.from('profils').select('id,pseudo,avatar'),
    sb.from('pronos').select('*'),
    sb.from('resultats').select('*'),
    sb.from('pronos_championnat').select('*').eq('championnat', currentChamp),
    sb.from('resultat_championnat').select('*').eq('championnat', currentChamp),
    sb.from('manches').select('*').eq('championnat', currentChamp).order('ordre'),
  ]);
  const profils = profilsR.data||[];
  profils.forEach(p=>{ if(p.avatar) AVATARS[p.id]=p.avatar; });
  const manches = manchesR.data||[];
  const mancheIds = new Set(manches.filter(m=>!m.annulee).map(m=>m.id));
  const pronos = (pronosR.data||[]).filter(pr=> mancheIds.has(pr.manche_id));
  const resultats = (resultatsR.data||[]).filter(r=> mancheIds.has(r.manche_id));
  const pchamp = pchampR.data||[];
  const rchamp = rchampR.data||[];

  // index résultats par manche+cat
  const resByKey = {};
  resultats.forEach(r=> resByKey[r.manche_id+'-'+r.categorie]=r);
  const rchampByCat = {};
  rchamp.forEach(r=> rchampByCat[r.categorie]=r);
  const mancheById = {};
  manches.forEach(m=> mancheById[m.id]=m);

  // points par joueur et par catégorie + détail par manche
  const myCats = cats();
  const pts = {};     // pts[userId] = { cat: points }
  const detail = {};  // detail[userId] = [{manche, cat, points}...]
  profils.forEach(p=>{ pts[p.id]={}; myCats.forEach(c=>pts[p.id][c]=0); detail[p.id]=[]; });

  // points manches
  pronos.forEach(pr=>{
    const res = resByKey[pr.manche_id+'-'+pr.categorie];
    if(res && pts[pr.user_id] && pts[pr.user_id][pr.categorie]!==undefined){
      const gain = scoreManche(pr, res);
      pts[pr.user_id][pr.categorie] += gain;
      const m = mancheById[pr.manche_id];
      detail[pr.user_id].push({ label:(m?m.nom:'Manche'), cat:pr.categorie, points:gain, ordre:(m?m.ordre:99) });
    }
  });
  // points championnat
  pchamp.forEach(pc=>{
    const res = rchampByCat[pc.categorie];
    if(res && pts[pc.user_id] && pts[pc.user_id][pc.categorie]!==undefined && pc.valide){
      const gain = scoreChamp(pc, res);
      pts[pc.user_id][pc.categorie] += gain;
      detail[pc.user_id].push({ label:'Championnat', cat:pc.categorie, points:gain, ordre:100 });
    }
  });

  // construire le classement selon la catégorie choisie
  let cat = classState.cat;
  // si la catégorie sélectionnée n'existe pas dans ce championnat, repasser en global
  if(cat!=='global' && !myCats.includes(cat)) cat='global';
  const ranked = profils.map(p=>{
    const perCat = {}; myCats.forEach(c=> perCat[c]=pts[p.id][c]||0);
    const totalAll = myCats.reduce((s,c)=> s+perCat[c], 0);
    const total = cat==='global' ? totalAll : (perCat[cat]||0);
    return { id:p.id, pseudo:p.pseudo, perCat, total, detail:detail[p.id] };
  }).sort((a,b)=> b.total - a.total);

  const hasAnyResult = resultats.length>0 || rchamp.length>0;

  // en-têtes des colonnes par catégorie (seulement en vue Générale)
  const catHeaders = cat==='global' ? myCats.map(c=>`<th>${c}</th>`).join('') : '';

  v.innerHTML = `
    <div class="card">
      <div class="subnav rank-subnav">
        <button class="sub-btn ${cat==='global'?'active':''}" data-cat="global">Général</button>
        ${myCats.map(c=>`<button class="sub-btn ${cat===c?'active':''}" data-cat="${c}">${c}</button>`).join('')}
      </div>
      ${!hasAnyResult ? '<div class="placeholder">Aucun résultat saisi pour le moment. Le classement apparaîtra dès le premier résultat de manche enregistré.</div>'
      : ranked.length===0 ? '<div class="placeholder">Aucun joueur inscrit pour le moment.</div>'
      : `${podiumTop3(ranked)}
         <div class="pod-detail" id="podDetail"></div>
         <div class="rank-hint">Touche un joueur pour voir le détail de ses points</div>
         ${ranked.length>3 ? `<table class="rank-table">
          <thead><tr><th>#</th><th>Pilote</th>${catHeaders}<th>Pts</th></tr></thead>
          <tbody>${ranked.slice(3).map((r,i)=>rankRow(r,i+3,cat,myCats)).join('')}</tbody>
        </table>` : ''}`}
    </div>
  `;
  v.querySelectorAll('.sub-btn').forEach(b=>{
    b.onclick = ()=>{ classState.cat=b.dataset.cat; renderClassement(v); };
  });
  // clic sur une ligne → afficher / masquer le détail (avec révélation animée à l'ouverture)
  v.querySelectorAll('.rank-row').forEach(row=>{
    row.onclick = ()=>{
      const det = row.nextElementSibling;
      if(det && det.classList.contains('detail-row')){
        const opening = !det.classList.contains('open');
        det.classList.toggle('open');
        if(opening){
          const r = ranked.find(x=> String(x.id)===String(row.dataset.uid));
          const wrap = det.querySelector('.det-wrap');
          if(r && wrap) revealDetail(wrap, r, cat, false);
        }
      }
    };
  });
  // clic sur un joueur du podium (top 3) → afficher son détail au-dessus du tableau
  const podBox = v.querySelector('#podDetail');
  v.querySelectorAll('.podium-top .pod-col[data-uid]').forEach(colEl=>{
    colEl.onclick = ()=>{
      const uid = colEl.dataset.uid;
      const r = ranked.find(x=> String(x.id)===String(uid));
      if(!r || !podBox) return;
      const already = colEl.classList.contains('sel');
      v.querySelectorAll('.podium-top .pod-col').forEach(c=>c.classList.remove('sel'));
      if(already){ podBox.classList.remove('open'); podBox.innerHTML=''; return; }
      colEl.classList.add('sel');
      podBox.classList.add('open');
      revealDetail(podBox, r, cat);
    };
  });
  // déclenche l'animation de chute du podium (rejouable à chaque affichage)
  const drops = v.querySelectorAll('.pod-drop');
  if(drops.length){
    drops.forEach(d=>d.classList.remove('play'));
    // double rAF + filet setTimeout pour fiabilité sur mobile
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
      drops.forEach(d=>d.classList.add('play'));
    }); });
    setTimeout(()=>{ drops.forEach(d=>{ if(!d.classList.contains('play')) d.classList.add('play'); }); }, 60);
  }
}

function podiumTop3(ranked){
  // top 3 du classement (affiché même si tout le monde est à 0 point)
  const top = ranked.slice(0,3);
  if(top.length===0) return '';
  const initial = (s)=> (s||'?').trim().charAt(0).toUpperCase() || '?';
  const col = (r, place)=>{
    if(!r) return `<div class="pod-col p${place}"></div>`;
    const crown = place===1 ? '<div class="pod-crown">👑</div>' : '<div class="pod-crown"></div>';
    return `<div class="pod-col p${place}" data-uid="${r.id}">
      <div class="pod-drop">
        ${crown}
        <div class="pod-ava">${avatarInner(r.id, r.pseudo)}</div>
        <div class="pod-name">${r.pseudo}</div>
        <div class="pod-pts">${r.total} pts</div>
      </div>
      <div class="pod-bar"></div>
    </div>`;
  };
  // ordre d'affichage : 2e - 1er - 3e
  return `<div class="podium-top">
    ${col(top[1], 2)}
    ${col(top[0], 1)}
    ${col(top[2], 3)}
  </div>`;
}

// ---- confettis (canvas léger, sans lib) ----
function fireConfetti(intensity){
  intensity = intensity || 1;
  let cv = document.getElementById('confettiCanvas');
  if(!cv){ cv=document.createElement('canvas'); cv.id='confettiCanvas'; document.body.appendChild(cv); }
  const ctx = cv.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  cv.width = innerWidth*dpr; cv.height = innerHeight*dpr; ctx.scale(dpr,dpr);
  const colors = ['#1ea7e1','#e23b2e','#ffe27a','#2ecc71','#ffffff'];
  const N = Math.round(80*intensity);
  const parts = [];
  for(let i=0;i<N;i++){
    parts.push({
      x: innerWidth/2 + (Math.random()-.5)*120,
      y: innerHeight*0.32,
      vx:(Math.random()-.5)*9,
      vy:-(Math.random()*9+5),
      g:0.28+Math.random()*0.15,
      s:5+Math.random()*6,
      rot:Math.random()*6.28, vr:(Math.random()-.5)*0.3,
      c:colors[(Math.random()*colors.length)|0],
      life:0, max:90+Math.random()*40
    });
  }
  let raf;
  (function loop(){
    ctx.clearRect(0,0,innerWidth,innerHeight);
    let alive=false;
    parts.forEach(p=>{
      if(p.life>p.max) return;
      alive=true; p.life++;
      p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      const a = Math.max(0, 1-(p.life/p.max));
      ctx.save(); ctx.globalAlpha=a; ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
    });
    if(alive){ raf=requestAnimationFrame(loop); }
    else { ctx.clearRect(0,0,innerWidth,innerHeight); if(cv.parentNode) cv.parentNode.removeChild(cv); }
  })();
}

// ---- révélation animée du détail des points ----
function revealDetail(container, r, cat, showHead){
  showHead = showHead !== false;
  const items = (r.detail||[])
    .filter(d => cat==='global' ? true : d.cat===cat)
    .sort((a,b)=> a.ordre-b.ordre);
  const total = items.reduce((s,d)=> s + (d.points||0), 0);
  const totCls = total>0?'':(total<0?'neg':'zero');
  const head = showHead ? `<div class="pd-head">${r.pseudo}</div>` : '';
  if(!items.length){
    container.innerHTML = head + `<div class="det-empty">Aucun point sur cette catégorie pour le moment.</div>`;
    return;
  }
  // structure : gros total animé + lignes cachées
  container.innerHTML = head +
    `<div class="reveal-total"><span class="rt-num ${totCls}">0</span><span class="rt-lbl">points</span></div>
    <div class="rv-lines"></div>`;
  const numEl = container.querySelector('.rt-num');
  const linesBox = container.querySelector('.rv-lines');
  let running = 0;
  // apparition séquentielle des lignes + cumul du total
  items.forEach((d,i)=>{
    setTimeout(()=>{
      const line=document.createElement('div');
      const big = d.points>=10;
      line.className='det-line rv'+(d.points>0?' flash':'');
      line.innerHTML=`<span class="det-label">${d.label} <span class="det-cat">${d.cat}</span></span>
        <span class="det-pts ${d.points<0?'neg':''}">${d.points>0?'+':''}${d.points}</span>`;
      linesBox.appendChild(line);
      // anime le total de running -> running+points
      const from=running, to=running+(d.points||0); running=to;
      const dur=420, t0=performance.now();
      (function tick(now){
        const k=Math.min(1,(now-t0)/dur);
        const val=Math.round(from+(to-from)*(k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2));
        numEl.textContent=val;
        if(k<1) requestAnimationFrame(tick);
        else { numEl.classList.remove('pop'); void numEl.offsetWidth; numEl.classList.add('pop'); }
      })(t0);
    }, 120 + i*320);
  });
  // confettis final selon performance
  const hasPerfect = items.some(d=> d.points>=15);
  const has5x = items.some(d=> /5e/i.test(d.label) && d.points>0);
  setTimeout(()=>{
    if(hasPerfect) fireConfetti(1.6);
    else if(total>=10 || has5x) fireConfetti(1);
  }, 160 + items.length*320 + 200);
}

function detailLines(r, cat){
  const items = (r.detail||[])
    .filter(d => cat==='global' ? true : d.cat===cat)
    .sort((a,b)=> a.ordre-b.ordre);
  return items.length
    ? items.map(d=>`<div class="det-line">
        <span class="det-label">${d.label} <span class="det-cat">${d.cat}</span></span>
        <span class="det-pts ${d.points<0?'neg':''}">${d.points>0?'+':''}${d.points}</span>
      </div>`).join('')
    : '<div class="det-empty">Aucun point sur cette catégorie pour le moment.</div>';
}

function rankRow(r, i, cat, myCats){
  const medal = i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const rankBadge = i<3 ? `<span class="medal ${medal}">${i+1}</span>` : `<span class="rk">${i+1}</span>`;
  const cols = (cat==='global' && myCats)
    ? myCats.map(c=>`<td class="rk-sub">${r.perCat[c]||0}</td>`).join('')
    : '';
  const colspan = 2 + ((cat==='global' && myCats) ? myCats.length : 0) + 1;

  // construire le détail (filtré selon la catégorie affichée)
  const detailHtml = detailLines(r, cat);

  return `<tr class="rank-row" data-uid="${r.id}">
    <td>${rankBadge}</td>
    <td class="rk-name">${r.pseudo}</td>
    ${cols}
    <td class="rk-total">${r.total}</td>
  </tr>
  <tr class="detail-row"><td colspan="${colspan}"><div class="det-wrap">${detailHtml}</div></td></tr>`;
}

// ====== VUE STATS (données du jeu) ======
async function renderStats(v){
  v.innerHTML = `<div class="card"><div class="loading">Calcul des stats…</div></div>`;
  await loadPilotes();
  await loadConfig();

  const [pronosR, resultatsR, pchampR, manchesR] = await Promise.all([
    sb.from('pronos').select('*'),
    sb.from('resultats').select('*'),
    sb.from('pronos_championnat').select('*').eq('championnat', currentChamp),
    sb.from('manches').select('id,annulee,closes_at').eq('championnat', currentChamp),
  ]);
  const now = Date.now();
  const manchesArr = (manchesR.data||[]).filter(m=>!m.annulee);
  // toutes les manches non annulées (pour les résultats/classement)
  const mancheIds = new Set(manchesArr.map(m=>m.id));
  // UNIQUEMENT les manches déjà fermées (pour ne pas dévoiler les pronos en cours)
  const mancheIdsFermees = new Set(manchesArr.filter(m=> m.closes_at && new Date(m.closes_at).getTime() <= now).map(m=>m.id));
  // pronos visibles dans les stats = ceux des manches fermées seulement
  const pronos = (pronosR.data||[]).filter(pr=> mancheIdsFermees.has(pr.manche_id));
  // pour la TENDANCE "plus pronostiqués", on compte toutes les manches (même ouvertes)
  const pronosTous = (pronosR.data||[]).filter(pr=> mancheIds.has(pr.manche_id));
  const resultats = (resultatsR.data||[]).filter(r=> mancheIds.has(r.manche_id));
  // prono championnat : visible seulement si la deadline du championnat est passée
  const champDeadlinePassee = (CHAMP_CLOSES_AT && CHAMP_CLOSES_LOADED_FOR===currentChamp)
    ? (new Date(CHAMP_CLOSES_AT).getTime() <= now) : false;
  const pchamp = champDeadlinePassee ? (pchampR.data||[]) : [];

  const pidInfo = {};
  allPilotes().forEach(p=> pidInfo[p.id] = p);
  const nameOf = id => pidInfo[id] ? `${pidInfo[id].nom}${pidInfo[id].numero?` #${pidInfo[id].numero}`:''}` : '?';
  const catOf  = id => pidInfo[id] ? pidInfo[id].categorie : null;

  // 1) PILOTES LES PLUS PRONOSTIQUÉS (tendance — toutes manches, même ouvertes)
  const popCount = {}; // id -> nb de fois cité dans un podium
  const addPos = (id)=>{ if(id) popCount[id]=(popCount[id]||0)+1; };
  const pchampTous = pchampR.data||[];
  pronosTous.forEach(pr=>{ addPos(pr.p1_pilote_id); addPos(pr.p2_pilote_id); addPos(pr.p3_pilote_id); if(pr.joue_bonus5) addPos(pr.p5_pilote_id); });
  pchampTous.forEach(pc=>{ addPos(pc.p1_pilote_id); addPos(pc.p2_pilote_id); addPos(pc.p3_pilote_id); if(pc.joue_bonus5) addPos(pc.p5_pilote_id); });
  const popList = Object.entries(popCount).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // 2) PALMARÈS DANS LES RÉSULTATS (victoires = p1, podiums = p1/p2/p3)
  const wins={}, podiums={};
  resultats.forEach(r=>{
    if(r.p1_pilote_id){ wins[r.p1_pilote_id]=(wins[r.p1_pilote_id]||0)+1; }
    [r.p1_pilote_id,r.p2_pilote_id,r.p3_pilote_id].forEach(id=>{ if(id) podiums[id]=(podiums[id]||0)+1; });
  });
  const palmares = Object.keys(podiums)
    .map(id=>({id, wins:wins[id]||0, podiums:podiums[id]}))
    .sort((a,b)=> b.wins-a.wins || b.podiums-a.podiums).slice(0,10);

  // 3) PILOTES QUI RAPPORTENT LE PLUS DE POINTS
  // pour chaque prono, on calcule les points et on les attribue aux pilotes du podium
  const resByKey={}; resultats.forEach(r=> resByKey[r.manche_id+'-'+r.categorie]=r);
  const ptsByPilote={};
  pronos.forEach(pr=>{
    const res=resByKey[pr.manche_id+'-'+pr.categorie];
    if(!res) return;
    const gain=scoreManche(pr,res);
    if(gain<=0) return;
    // répartir le "mérite" sur les pilotes du podium pronostiqué qui étaient bons
    [pr.p1_pilote_id,pr.p2_pilote_id,pr.p3_pilote_id].forEach(id=>{
      if(id && [res.p1_pilote_id,res.p2_pilote_id,res.p3_pilote_id].includes(id)){
        ptsByPilote[id]=(ptsByPilote[id]||0)+gain/3;
      }
    });
  });
  const rapporteurs = Object.entries(ptsByPilote)
    .map(([id,p])=>({id, pts:Math.round(p)}))
    .sort((a,b)=>b.pts-a.pts).slice(0,10);

  const hasData = pronosTous.length>0 || resultats.length>0;

  // mélange l'ordre pour ne PAS révéler de classement précis (juste une tendance)
  const popShuffled = popList.slice().sort(()=> Math.random()-0.5);
  const popBlock = popShuffled.length ? popShuffled.map(([id,n])=>`
    <div class="stat-row"><span class="stat-dot">•</span>
      <span class="stat-name">${nameOf(id)} ${catOf(id)?`<span class="cat-mini cat-${catOf(id)}">${catOf(id)}</span>`:''}</span>
      <span class="stat-val">${n}×</span></div>`).join('')
    : '<div class="det-empty">Pas encore de pronostics enregistrés.</div>';

  const palmBlock = palmares.length ? palmares.map((p,i)=>`
    <div class="stat-row"><span class="stat-rk">${i+1}</span>
      <span class="stat-name">${nameOf(p.id)} ${catOf(p.id)?`<span class="cat-mini cat-${catOf(p.id)}">${catOf(p.id)}</span>`:''}</span>
      <span class="stat-val">${p.wins>0?`🏆 ${p.wins}`:''} <span class="stat-sub">${p.podiums} pod.</span></span></div>`).join('')
    : '<div class="det-empty">Aucun résultat saisi pour le moment.</div>';

  const rapBlock = rapporteurs.length ? rapporteurs.map((p,i)=>`
    <div class="stat-row"><span class="stat-rk">${i+1}</span>
      <span class="stat-name">${nameOf(p.id)} ${catOf(p.id)?`<span class="cat-mini cat-${catOf(p.id)}">${catOf(p.id)}</span>`:''}</span>
      <span class="stat-val">${p.pts} pts</span></div>`).join('')
    : '<div class="det-empty">Pas encore de points distribués.</div>';

  v.innerHTML = `
    <div class="card">
      ${isNations() ? mxdnStatsBlock(true) : ''}
      ${!hasData ? `<div class="placeholder">${isNations()?'Les stats des joueurs apparaîtront dès les premiers pronostics et résultats. En attendant, consulte le palmarès des nations ci-dessus 👆':'Les stats apparaîtront dès les premiers pronostics et résultats.'}</div>` : `
      <div class="stat-sec">
        <div class="stat-title">⭐ Les plus pronostiqués</div>
        <p class="stat-desc">Les pilotes que le club cite souvent (tendance, sans ordre précis).</p>
        ${popBlock}
      </div>
      <div class="stat-sec">
        <div class="stat-title">🏆 Palmarès des pilotes</div>
        <p class="stat-desc">Victoires et podiums dans les manches saisies.</p>
        ${palmBlock}
      </div>
      <div class="stat-sec">
        <div class="stat-title">💰 Les meilleurs tuyaux</div>
        <p class="stat-desc">Les pilotes qui ont rapporté le plus de points aux joueurs.</p>
        ${rapBlock}
      </div>`}
    </div>
  `;
}

let PILOTES = {}; // { categorie: [...] } dynamique selon le championnat

async function loadPilotes(){
  if(Object.keys(PILOTES).length) return;
  cats().forEach(c=> PILOTES[c]=[]);
  const { data } = await sb.from('pilotes').select('*').eq('actif', true).eq('valide', true)
    .eq('championnat', currentChamp).order('numero');
  (data||[]).forEach(p=>{ if(PILOTES[p.categorie]) PILOTES[p.categorie].push(p); });
}
function allPilotes(){ return Object.values(PILOTES).flat(); }

function isClosed(manche){
  if(manche.terminee) return true;
  if(!manche.closes_at) return false;
  return Date.now() >= new Date(manche.closes_at).getTime();
}

  const body = document.getElementById('pronoBody');

  const open = actives.filter(m=>!isClosed(m));
  const closed = actives.filter(m=>isClosed(m));

  // charger mes pronos existants pour afficher l'état
  const { data: mesPronos } = await sb.from('pronos').select('manche_id,categorie')
    .eq('user_id', currentSession.user.id);
  const pronoSet = new Set((mesPronos||[]).map(p=>p.manche_id+'-'+p.categorie));

  const card = (m, closedFlag)=>{
    const mc = mancheCats(m);
    const nbDone = mc.filter(c=> pronoSet.has(m.id+'-'+c)).length;
    // mini-podium si la manche est fermée ET qu'un résultat officiel est saisi
    let podiumHtml = '';
    if(closedFlag){
      const resCats = resByManche[m.id] || {};
      const lines = mc.filter(c=> resCats[c]).map(c=>{
        const r = resCats[c];
        const medals = ['🥇','🥈','🥉'];
        const ids = [r.p1_pilote_id, r.p2_pilote_id, r.p3_pilote_id];
        const showCat = mc.length>1 ? `<span class="mp-cat">${c}</span>` : '';
        const podLines = ids.map((id,i)=> id ? `<span class="mp-line"><span class="mp-medal">${medals[i]}</span><span class="mp-name">${pidName[id]||'?'}</span></span>` : '').join('');
        return showCat + podLines;
      }).join('');
      if(lines) podiumHtml = `<span class="m-podium">${lines}</span>`;
    }
    const etat = podiumHtml

  });

}

// ----- compte à rebours -----
function countdownText(closesAt){
  if(!closesAt) return 'Ouverte';
  const left = new Date(closesAt).getTime() - Date.now();
  if(left <= 0) return 'Fermée';
  const d = Math.floor(left/86400000);
  const h = Math.floor(left%86400000/3600000);
  const m = Math.floor(left%3600000/60000);
  if(d > 0) return `Ferme dans ${d}j ${h}h`;
  if(h > 0) return `Ferme dans ${h}h ${String(m).padStart(2,'0')}min`;
  const s = Math.floor(left%60000/1000);
  return `Ferme dans ${m}min ${String(s).padStart(2,'0')}s`;
}
let countdownTimer = null;
function startCountdowns(){
  if(countdownTimer) clearInterval(countdownTimer);
  const tick = ()=>{
    document.querySelectorAll('[data-countdown]').forEach(el=>{
      const ca = el.dataset.countdown;
      el.textContent = countdownText(ca);
      if(ca && new Date(ca).getTime() - Date.now() <= 0){
        el.classList.remove('m-open'); el.classList.add('m-closed');
      }
    });
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

function frDate(d){
  if(!d) return '';
  const dt = new Date(d+'T12:00:00');
  return dt.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'});
}

// ----- écran de prono d'une manche (250 + 450) -----
async function openMancheProno(mancheId, manche){
  const v = document.getElementById('view');
  const closed = isClosed(manche);
  v.innerHTML = `<div class="card"><div class="loading">Chargement…</div></div>`;

  // charger mes pronos existants pour cette manche
  const { data: existing } = await sb.from('pronos').select('*')
    .eq('user_id', currentSession.user.id).eq('manche_id', mancheId);
  const byCat = {};
  (existing||[]).forEach(p=> byCat[p.categorie]=p);
  const aDejaPronostique = (existing||[]).length > 0;

  // date de fermeture lisible
  const closeStr = manche.closes_at
    ? new Date(manche.closes_at).toLocaleString('fr-FR',{weekday:'long',day:'2-digit',month:'long',hour:'2-digit',minute:'2-digit'})
    : null;

  // bandeau de statut clair
  let statusBanner;
  if(closed){
    statusBanner = `<div class="status-banner closed">🔒 Pronostics fermés — non modifiable</div>`;
  } else if(aDejaPronostique){
    statusBanner = `<div class="status-banner done">✓ Tu as déjà pronostiqué${closeStr?` — modifiable jusqu'au ${closeStr}`:''}</div>`;
  } else {
    statusBanner = `<div class="status-banner open">À pronostiquer${closeStr?` — ferme le ${closeStr}`:''}</div>`;
  }

  v.innerHTML = `
    <div class="card">
      <button class="back" id="back">← Retour aux manches</button>
      <div class="sec-title">${manche.nom}</div>
      <p class="sec-sub">${frDate(manche.date_course)}</p>
      ${statusBanner}
      ${isNations() ? mxdnStatsBlock() : ''}
      ${closed ? '' : `<div class="countdown-banner" data-countdown="${manche.closes_at||''}">${countdownText(manche.closes_at)}</div>`}
      ${mancheCats(manche).map(c=> podiumBlock(c, byCat[c], closed)).join('')}
      ${closed ? '' : `<button class="propose-btn" id="proposeBtn">+ Proposer ${isNations()?'une nation absente':'un pilote absent'} de la liste</button>`}
      <div class="msg" id="pmsg"></div>
      ${closed ? '' : `<button class="btn" id="savePronos">${aDejaPronostique?'Modifier mes pronostics':'Enregistrer mes pronostics'}</button>`}
      ${(!closed && aDejaPronostique) ? `<button class="btn-del" id="delPronos">Supprimer mon pronostic</button>` : ''}
      ${closed ? `<div id="clubPronos" class="club-pronos"><div class="loading">Chargement des pronos du club…</div></div>` : ''}
    </div>
  `;
  document.getElementById('back').onclick = ()=>{ switchView('pronos'); };
  if(closed){
    renderClubPronos(mancheId, manche);
  }
  if(!closed){
    mancheCats(manche).forEach(c=>setupPodium(c));
    document.getElementById('savePronos').onclick = ()=>saveMancheProno(mancheId, manche);
    document.getElementById('proposeBtn').onclick = ()=>openProposeForm();
    const delBtn = document.getElementById('delPronos');
    if(delBtn) delBtn.onclick = ()=>deleteMancheProno(mancheId, manche);
    startCountdowns();
  }
}

    sb.from('pronos').select('*')
  ]);
  const profils = profilsR.data || [];
  const pilotes = pilotesR.data || [];
  const manches = manchesR.data || [];
  const pronos  = pronosR.data || [];

  // maps
  const pidName = {};
  pilotes.forEach(p=>{
    pidName[p.id] = (p.championnat==='MXdN') ? p.nom : `${p.nom}${p.numero?` #${p.numero}`:''}`;
  });
  const mById = {};
  manches.forEach(m=> mById[m.id]=m);

  // ne garder que les pronos de manches FERMÉES
  const closedPronos = pronos.filter(pr=>{
    const m = mById[pr.manche_id];
    return m && isClosed(m);
  });

  // grouper par joueur -> championnat -> manche(ordre) -> [pronos par cat]
  const byUser = {};
  closedPronos.forEach(pr=>{
    const m = mById[pr.manche_id];
    (byUser[pr.user_id] = byUser[pr.user_id] || {});
    const champ = m.championnat;
    (byUser[pr.user_id][champ] = byUser[pr.user_id][champ] || {});
    const key = m.ordre + '|' + m.nom;
    (byUser[pr.user_id][champ][key] = byUser[pr.user_id][champ][key] || []).push(pr);
  });

  // INTEL : manches à venir (ouvertes) où le joueur a déjà misé, SANS le contenu
  const intelByUser = {};
  pronos.forEach(pr=>{
    const m = mById[pr.manche_id];
    if(!m || m.annulee) return;
    if(isClosed(m)) return; // seulement les manches encore ouvertes
    const set = intelByUser[pr.user_id] = intelByUser[pr.user_id] || {};
    // clé unique par manche pour dédupliquer les catégories, on garde ordre pour le tri
    set[m.id] = { nom:m.nom, champ:m.championnat, ordre:m.ordre };
  });

  // tri des joueurs : actifs (podiums passés OU intel à venir) d'abord, par pseudo
  profils.forEach(p=>{ if(p.avatar) AVATARS[p.id]=p.avatar; });
  const isActive = id => !!byUser[id] || !!intelByUser[id];
  const players = profils.slice().sort((a,b)=>{
    const ca = isActive(a.id)?1:0, cb = isActive(b.id)?1:0;
    if(ca!==cb) return cb-ca;
    return (a.pseudo||'').localeCompare(b.pseudo||'');
  });

  const champOrder = ['AMA','MXGP','Vendée','MXdN'];

  // bloc "intel" : manches à venir où le joueur a déjà misé (sans le contenu)
  const intelBlock = (uid)=>{
    const set = intelByUser[uid];
    if(!set || !Object.keys(set).length) return '';
    const list = Object.values(set).sort((a,b)=> (CHAMP_LABELS[a.champ]||a.champ).localeCompare(CHAMP_LABELS[b.champ]||b.champ) || a.ordre-b.ordre);
    const tags = list.map(it=>`<span class="cl-intel-tag">${it.nom} <span class="cl-intel-champ">${CHAMP_LABELS[it.champ]||it.champ}</span></span>`).join('');
    return `<div class="cl-intel">
      <div class="cl-intel-head">👀 A déjà misé sur (à venir)</div>
      <div class="cl-intel-tags">${tags}</div>
    </div>`;
  };

  const totalRevealed = closedPronos.length;
  const totalIntel = Object.keys(intelByUser).length;
  if(totalRevealed===0 && totalIntel===0){
    v.innerHTML = `<div class="card">
      <div class="sec-title">👥 Pronos du club</div>
      <div class="cl-empty">Aucun prono pour le moment.<br>Les podiums révélés apparaissent ici dès qu'une manche est <b>fermée</b>, et l'intel sur les manches à venir dès que les joueurs misent. 🐺</div>
    </div>`;
    return;
  }

  const playersHtml = players.map(pl=>{
    const data = byUser[pl.id];
    const col = avatarBg(pl.id, pl.pseudo);
    const intel = intelBlock(pl.id);
    const ini = avatarInner(pl.id, pl.pseudo);

    if(!data){
      // pas de podium révélé, mais peut-être de l'intel à venir
      const sub = intel ? "pronos à venir 👀" : "aucun prono révélé";
      const inner = intel || `<div class="cl-none">Ce joueur n'a pas encore de prono.</div>`;
      return `<div class="cl-player" data-uid="${pl.id}">
        <div class="cl-phead">
          <span class="cl-ava" style="background:${col}">${ini}</span>
          <span class="cl-pname">${pl.pseudo}</span>
          <span class="cl-pcount">${sub}</span>
          <span class="cl-chev">▸</span>
        </div>
        <div class="cl-pbody"><div class="cl-pinner">${inner}</div></div>
      </div>`;
    }
    // nombre total de podiums mis
    let nb = 0;
    Object.values(data).forEach(champ=> Object.values(champ).forEach(arr=> nb+=arr.length));

    const champsHtml = champOrder.filter(c=>data[c]).map(champ=>{
      // trier les manches par ordre
      const keys = Object.keys(data[champ]).sort((a,b)=> parseInt(a)-parseInt(b));
      const rows = keys.map(k=>{
        const nom = k.split('|')[1];
        const arr = data[champ][k];
        const pods = arr.map(pr=>{
          const l1=pidName[pr.p1_pilote_id]||'?', l2=pidName[pr.p2_pilote_id]||'?', l3=pidName[pr.p3_pilote_id]||'?';
          const l5 = pr.joue_bonus5 ? (pidName[pr.p5_pilote_id]||'?') : null;
          const catTag = (arr.length>1 || champ!=='MXdN') ? `<span class="cl-cat">${pr.categorie}</span>` : '';
          return `<div>${catTag}🥇 ${l1} · 🥈 ${l2} · 🥉 ${l3}${l5?` · <span class="cl-5">5e ${l5}</span>`:''}</div>`;
        }).join('');
        return `<div class="cl-row"><span class="cl-manche">${nom}</span><span class="cl-pod">${pods}</span></div>`;
      }).join('');
      return `<div class="cl-champ">${CHAMP_LABELS[champ]||champ}</div>${rows}`;
    }).join('');

    return `<div class="cl-player" data-uid="${pl.id}">
      <div class="cl-phead">
        <span class="cl-ava" style="background:${col}">${ini}</span>
        <span class="cl-pname">${pl.pseudo}</span>
        <span class="cl-pcount">${nb} podium${nb>1?'s':''}</span>
        <span class="cl-chev">▸</span>
      </div>
      <div class="cl-pbody"><div class="cl-pinner">${champsHtml}${intel}</div></div>
    </div>`;
  }).join('');

  v.innerHTML = `<div class="card">
    <div class="sec-title">👥 Pronos du club</div>
    <div class="cl-intro">Les pronos de tout le monde, tous championnats confondus. Seules les manches <b>fermées</b> sont révélées — touche un joueur pour déplier ses pronos.</div>
    ${playersHtml}
  </div>`;

  // accordéon
  v.querySelectorAll('.cl-phead').forEach(head=>{
    head.onclick = ()=>{
      const card = head.closest('.cl-player');
      card.classList.toggle('open');
    };
  });
}

function setupPodium(cat){
  const block = document.querySelector(`.podium[data-cat="${cat}"]`);
  const selects = [...block.querySelectorAll('select[data-pos]')];
  // empêcher de choisir 2x le même pilote (sur p1/p2/p3)
  const refresh = ()=>{
    const chosen = selects.filter(s=>['p1','p2','p3'].includes(s.dataset.pos)).map(s=>s.value).filter(Boolean);
    selects.forEach(s=>{
      if(!['p1','p2','p3'].includes(s.dataset.pos)) return;
      [...s.options].forEach(o=>{
        if(!o.value) return;
        o.disabled = chosen.includes(o.value) && s.value !== o.value;
      });
    });
  };
  selects.forEach(s=> s.onchange = refresh);
  refresh();
  // toggle bonus 5e
  const chk = block.querySelector('input[data-bonus5]');
  chk.onchange = ()=>{
    block.querySelector('.bonus5').classList.toggle('hidden', !chk.checked);
  };
}

async function saveMancheProno(mancheId, manche){
  if(isClosed(manche)){ return showPMsg("Cette manche est fermée.", 'err'); }
  const rows = [];
  for(const cat of mancheCats(manche)){
    const block = document.querySelector(`.podium[data-cat="${cat}"]`);
    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;
    const bonus = block.querySelector('input[data-bonus5]').checked;
    const p1=get('p1'), p2=get('p2'), p3=get('p3'), p5=bonus?get('p5'):null;
    // validation : podium complet requis si on enregistre cette catégorie
    if(p1||p2||p3){
      if(!(p1&&p2&&p3)) return showPMsg(`Complète tout le podium ${cat} (1er, 2e, 3e).`, 'err');
      if(bonus && !p5) return showPMsg(`Choisis ton pilote 5e en ${cat} ou décoche le bonus.`, 'err');
      rows.push({ user_id: currentSession.user.id, manche_id: mancheId, categorie: cat,
        p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, joue_bonus5:bonus });
    }
  }
  if(!rows.length) return showPMsg("Choisis au moins un podium avant d'enregistrer.", 'err');

  showPMsg("Enregistrement…", 'ok');
  const { error } = await sb.from('pronos').upsert(rows, { onConflict:'user_id,manche_id,categorie' });
  if(error) return showPMsg(error.message, 'err');
  // confirmation claire en overlay
  showConfirmOverlay(manche);
}

function showConfirmOverlay(manche){
  const closeStr = manche.closes_at
    ? new Date(manche.closes_at).toLocaleString('fr-FR',{weekday:'long',day:'2-digit',month:'long',hour:'2-digit',minute:'2-digit'})
    : null;
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="modal confirm-modal">
      <div class="confirm-check">✓</div>
      <div class="confirm-title">Pronostics enregistrés !</div>
      <p class="confirm-text">Ton podium pour <b>${manche.nom}</b> est bien validé.${closeStr?`<br>Tu peux encore le modifier jusqu'au <b>${closeStr}</b>.`:''}</p>
      <button class="btn" id="confirmOk" style="margin-top:4px">Compris</button>
    </div>`;
  document.body.appendChild(ov);
  document.getElementById('confirmOk').onclick = ()=>{ ov.remove(); switchView('pronos'); };
}

function showPMsg(t,type){ const m=document.getElementById('pmsg'); if(m){ m.textContent=t; m.className='msg show '+type; } }

      <div class="modal-actions">

  document.body.appendChild(ov);

    const numero = numEl ? (numEl.value || null) : null;
    const nom = document.getElementById('prNom').value.trim();
    const categorie = document.getElementById('prCat').value;
    const m = document.getElementById('prmsg');
    if(!nom){ m.className='msg show err'; m.textContent=nat?"Entre le nom du pays.":"Entre le nom du pilote."; return; }
    // anti-doublon basique : vérifie si un nom proche existe déjà (validé ou non)
    const { data: existing } = await sb.from('pilotes').select('nom').eq('championnat', currentChamp).ilike('nom', nom);
    if(existing && existing.length){ m.className='msg show err'; m.textContent=nat?"Cette nation semble déjà exister.":"Ce pilote semble déjà exister."; return; }
    const { error } = await sb.from('pilotes').insert({
      numero, nom, categorie, valide:false, propose_par: currentSession.user.id, championnat: currentChamp
    });
    if(error){ m.className='msg show err'; m.textContent=error.message; return; }
    m.className='msg show ok'; m.textContent="✓ Proposition envoyée ! L'admin la validera bientôt.";
    setTimeout(()=> ov.remove(), 1800);
  };
}

// ----- prono championnat -----
let CHAMP_CLOSES_AT = undefined;
let CHAMP_CLOSES_LOADED_FOR = null; // pour quel championnat la date est chargée

async function loadConfig(){
  if(CHAMP_CLOSES_LOADED_FOR === currentChamp) return; // déjà chargé pour ce champ
  const { data } = await sb.from('config_champ').select('champ_closes_at')
    .eq('championnat', currentChamp).maybeSingle();
  CHAMP_CLOSES_AT = data?.champ_closes_at || null;
  CHAMP_CLOSES_LOADED_FOR = currentChamp;
}

function champClosed(){
  if(!CHAMP_CLOSES_AT) return false;
  return Date.now() >= new Date(CHAMP_CLOSES_AT).getTime();
}

async function renderChampPronos(body){
  body.innerHTML = `<div class="loading">Chargement…</div>`;
  await loadConfig();
  const { data: existing } = await sb.from('pronos_championnat').select('*')
    .eq('user_id', currentSession.user.id).eq('championnat', currentChamp);
  const byCat = {}; (existing||[]).forEach(p=>byCat[p.categorie]=p);
  const dejaValide = cats().every(c=> byCat[c]?.valide);
  const closed = champClosed();

  // bandeau d'info sur la deadline
  let banner = '';
  if(CHAMP_CLOSES_AT){
    if(closed){
      banner = `<div class="countdown-banner" style="color:var(--bone-dim);border-color:var(--line2);background:var(--night2)">Pronostics championnat fermés</div>`;
    } else {
      banner = `<div class="countdown-banner" data-countdown="${CHAMP_CLOSES_AT}">${countdownText(CHAMP_CLOSES_AT)}</div>`;
    }
  }

  // si fermé et pas validé : on montre quand même en lecture seule
  const lockAll = closed || dejaValide;

  body.innerHTML = `
    <p class="sec-sub">Pronostique le podium FINAL du championnat (1er/2e/3e). Ferme à la mi-saison, et une fois validé c'est figé !</p>
    ${banner}
    ${cats().map(c=> champBlock(c, byCat[c], lockAll)).join('')}
    <div class="msg" id="cmsg"></div>
    ${dejaValide ? '<div class="voted-note2">✓ Tes pronostics championnat sont validés et figés</div>'
      : closed ? '<div class="voted-note2" style="background:rgba(143,166,187,.1);border-color:var(--line2);color:var(--bone-dim)">Les pronostics championnat sont fermés (mi-saison dépassée)</div>'
      : `<button class="btn" id="saveChamp">Valider mes pronostics championnat</button>
         <p class="hint" style="text-align:center">⚠️ La validation est définitive, vérifie bien avant !</p>`}
  `;
  if(!lockAll){
    cats().forEach(c=>setupChampPodium(c));
    document.getElementById('saveChamp').onclick = saveChampProno;
    startCountdowns();
  } else if(!closed) {
    startCountdowns();
  }
}

function champBlock(cat, existing, forceLock){
  const pilotes = PILOTES[cat]||[];
  const e = existing||{};
  const closed = e.valide || forceLock;
  const opt = (selId)=> '<option value="">—</option>' + pilotes.map(p=>
    `<option value="${p.id}" ${selId==p.id?'selected':''}>#${p.numero||'?'} ${p.nom}</option>`).join('');
  const dis = closed ? 'disabled' : '';
  return `
    <div class="podium champ" data-cat="${cat}">
      <div class="podium-head"><span class="cat-tag cat-${cat}">${cat}</span> Podium championnat ${e.valide?'<span class="lock">🔒 figé</span>':''}</div>
      <div class="pod-row"><label>1<sup>er</sup></label><select ${dis} data-pos="p1">${opt(e.p1_pilote_id)}</select></div>
      <div class="pod-row"><label>2<sup>e</sup></label><select ${dis} data-pos="p2">${opt(e.p2_pilote_id)}</select></div>
      <div class="pod-row"><label>3<sup>e</sup></label><select ${dis} data-pos="p3">${opt(e.p3_pilote_id)}</select></div>
      <div class="pod-bonus">
        <label class="chk"><input type="checkbox" ${dis} data-bonus5 ${e.joue_bonus5?'checked':''}> Tenter le bonus 5<sup>e</sup> place finale</label>
        <div class="pod-row bonus5 ${e.joue_bonus5?'':'hidden'}"><label>5<sup>e</sup></label><select ${dis} data-pos="p5">${opt(e.p5_pilote_id)}</select></div>
      </div>
    </div>
  `;
}

function setupChampPodium(cat){ setupPodium(cat); } // même logique anti-doublon

async function saveChampProno(){
  if(champClosed()) return showCMsg("Les pronostics championnat sont fermés (mi-saison dépassée).", 'err');
  const rows = [];
  for(const cat of cats()){
    const block = document.querySelector(`.podium.champ[data-cat="${cat}"]`);
    if(!block) continue;
    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;
    const bonus = block.querySelector('input[data-bonus5]').checked;
    const p1=get('p1'), p2=get('p2'), p3=get('p3'), p5=bonus?get('p5'):null;
    if(!(p1&&p2&&p3)) return showCMsg(`Complète tout le podium championnat ${cat}.`, 'err');
    if(bonus && !p5) return showCMsg(`Choisis ton 5e en ${cat} ou décoche le bonus.`, 'err');
    rows.push({ user_id: currentSession.user.id, categorie: cat, championnat: currentChamp,
      p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, joue_bonus5:bonus, valide:true });
  }
  if(rows.length < cats().length) return showCMsg("Remplis tous les podiums du championnat.", 'err');

  if(!confirm("Valider définitivement tes pronostics championnat ? Tu ne pourras plus les modifier.")) return;
  showCMsg("Validation…", 'ok');
  const { error } = await sb.from('pronos_championnat').upsert(rows, { onConflict:'user_id,categorie,championnat' });
  if(error) return showCMsg(error.message, 'err');
  showCMsg("✓ Pronostics championnat validés et figés !", 'ok');
  setTimeout(()=>renderChampPronos(document.getElementById('pronoBody')), 1500);
}

}

// ====== ADMIN · RÉSULTATS (liste cliquable) ======
async function renderAdminResultats(body){
  body.innerHTML = `<div class="loading">Chargement…</div>`;
  await loadPilotes();
  const { data: manches, error } = await sb.from('manches').select('*').eq('championnat', currentChamp).order('ordre');
  if(error){ body.innerHTML = `<div class="msg err show">${error.message}</div>`; return; }
  const { data: resultats } = await sb.from('resultats').select('manche_id,categorie');
  const resSet = new Set((resultats||[]).map(r=>r.manche_id+'-'+r.categorie));

  const rows = (manches||[]).map(m=>{
    const mc = mancheCats(m);
    const done = mc.filter(c=> resSet.has(m.id+'-'+c)).length;
    const resState = m.annulee ? '<span class="m-annulee">Annulée</span>'
                   : (done===mc.length) ? '<span class="tag-done2">✓ résultats</span>'
                   : (done>0) ? '<span class="tag-partial">partiel</span>'
                   : '<span class="tag-none">à saisir</span>';
    return `<div class="admin-manche-wrap ${m.annulee?'is-annulee':''}">
      <button class="manche-row admin-row" data-manche="${m.id}" ${m.annulee?'disabled':''}>
        <span class="m-ord">${m.ordre}</span>
        <span class="m-info"><span class="m-nom">${m.nom}</span><span class="m-date">${frDate(m.date_course)}</span></span>
        <span class="m-state">${resState}</span>
      </button>
      <button class="annul-btn" data-annul="${m.id}" data-etat="${m.annulee?1:0}">
        ${m.annulee?'Réactiver':'Annuler'}
      </button>
    </div>`;
  }).join('');

  body.innerHTML = `
    <div class="sec-title">Saisie des résultats</div>
    <p class="sec-sub">Clique sur une manche pour entrer le podium réel. Le bouton "Annuler" marque une épreuve non courue.</p>
    ${rows}
  `;
  body.querySelectorAll('.admin-row:not([disabled])').forEach(b=>{
    b.onclick = ()=> openResultEntry(+b.dataset.manche, manches.find(m=>m.id==b.dataset.manche));
  });
  body.querySelectorAll('.annul-btn').forEach(b=>{
    b.onclick = async ()=>{
      const id = +b.dataset.annul;
      const nouvelEtat = b.dataset.etat==='1' ? false : true;
      const m = manches.find(x=>x.id===id);
      const msg = nouvelEtat
        ? `Marquer "${m.nom}" comme ANNULÉE ? Elle ne comptera pas dans les classements.`
        : `Réactiver "${m.nom}" ?`;
      if(!confirm(msg)) return;
      await sb.from('manches').update({ annulee: nouvelEtat }).eq('id', id);
      renderAdminResultats(body);
    };
  });
}

async function openResultEntry(mancheId, manche){

  v.innerHTML = `<div class="card"><div class="loading">Chargement…</div></div>`;

  const { data: existing } = await sb.from('resultats').select('*').eq('manche_id', mancheId);

function resultBlock(cat, existing){
  const nat = isNations();
  const pilotes = PILOTES[cat]||[];
  const e = existing||{};
  const opt = (selId)=> '<option value="">—</option>' + pilotes.map(p=>
    `<option value="${p.id}" ${selId==p.id?'selected':''}>${nat ? p.nom : `#${p.numero||'?'} ${p.nom}`}</option>`).join('');
  const tag = nat ? '<span class="cat-tag cat-nations">🏆 Nations</span>' : `<span class="cat-tag cat-${cat}">${cat}</span>`;
  return `
    <div class="podium result" data-cat="${cat}">
      <div class="podium-head">${tag} Podium réel</div>
      <div class="pod-row"><label>1<sup>er</sup></label><select data-pos="p1">${opt(e.p1_pilote_id)}</select></div>
      <div class="pod-row"><label>2<sup>e</sup></label><select data-pos="p2">${opt(e.p2_pilote_id)}</select></div>
      <div class="pod-row"><label>3<sup>e</sup></label><select data-pos="p3">${opt(e.p3_pilote_id)}</select></div>
      <div class="pod-row"><label>5<sup>e</sup></label><select data-pos="p5">${opt(e.p5_pilote_id)}</select></div>
    </div>
  `;
}

function setupResult(cat){
  const block = document.querySelector(`.podium.result[data-cat="${cat}"]`);
  const selects = [...block.querySelectorAll('select[data-pos]')];
  const refresh = ()=>{
    const chosen = selects.map(s=>s.value).filter(Boolean);
    selects.forEach(s=>{
      [...s.options].forEach(o=>{
        if(!o.value) return;
        o.disabled = chosen.includes(o.value) && s.value !== o.value;
      });
    });
  };
  selects.forEach(s=> s.onchange = refresh);
  refresh();
}

async function saveResult(mancheId, manche){
  const rows = [];
  for(const cat of mancheCats(manche)){
    const block = document.querySelector(`.podium.result[data-cat="${cat}"]`);
    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;
    const p1=get('p1'), p2=get('p2'), p3=get('p3'), p5=get('p5');
    if(p1||p2||p3||p5){
      if(!(p1&&p2&&p3)) return showRMsg(`Complète au moins le podium ${cat} (1er, 2e, 3e).`, 'err');
      rows.push({ manche_id:mancheId, categorie:cat,
        p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, updated_at:new Date().toISOString() });
    }
  }
  if(!rows.length) return showRMsg("Saisis au moins un podium.", 'err');

  showRMsg("Enregistrement…", 'ok');
  const { error } = await sb.from('resultats').upsert(rows, { onConflict:'manche_id,categorie' });
  if(error) return showRMsg(error.message, 'err');
  // marquer la manche comme terminée
  await sb.from('manches').update({ terminee:true }).eq('id', mancheId);
  showRMsg("✓ Résultats enregistrés ! (le calcul des points arrivera au prochain bloc)", 'ok');
}

// ====== CHAT DU CLUB ======
let chatInited = false;
let chatChannel = null;
let chatOpen = false;
let chatUnread = 0;
let chatSeenIds = new Set();
let chatLastMsgId = 0;          // id du message le plus récent affiché
let chatMembers = [];          // pseudos pour l'autocomplétion des mentions
let chatReads = {};            // user_id -> last_read_id (accusés de lecture des autres)
let chatTotalMembers = 0;      // nb total de joueurs (pour "vu par tous")

function chatLastReadKey(){
  const uid = currentSession ? currentSession.user.id : 'anon';
  return 'chat_last_read_' + uid;
}
function getChatLastRead(){
  try { return parseInt(localStorage.getItem(chatLastReadKey())) || 0; } catch(e){ return 0; }
}
function setChatLastRead(id){
  try { localStorage.setItem(chatLastReadKey(), String(id)); } catch(e){}
  // enregistre aussi en base pour les accusés de lecture des autres
  if(currentSession && id>0){
    const uid = currentSession.user.id;
    chatReads[uid] = Math.max(chatReads[uid]||0, id);
    sb.from('chat_reads').upsert({ user_id: uid, last_read_id: chatReads[uid], updated_at: new Date().toISOString() }, { onConflict:'user_id' })
      .then(()=>{}, ()=>{});
  }
}
function myPseudo(){
  return (currentProfil && currentProfil.pseudo) || 'Joueur';
}
function mentionsMe(txt){
  const me = myPseudo().toLowerCase();
  if(!me) return false;
  return new RegExp('@'+me.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(txt||'');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// surligne les @pseudo connus dans un message déjà échappé
function highlightMentions(safeText){
  if(!chatMembers.length) return safeText;
  const me = myPseudo().toLowerCase();
  // trie par longueur décroissante pour matcher les pseudos longs d'abord
  const names = chatMembers.slice().sort((a,b)=> b.length-a.length);
  let out = safeText;
  names.forEach(name=>{
    const safeName = escapeHtml(name);
    const re = new RegExp('@'+safeName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi');
    const cls = (name.toLowerCase()===me) ? 'cm-mention me' : 'cm-mention';
    out = out.replace(re, m=>`<span class="${cls}">${m}</span>`);
  });
  return out;
}
function chatTime(iso){
  const d=new Date(iso);
  return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function colorFromName(name){
  let h=0; for(let i=0;i<(name||'').length;i++) h=(h*31+name.charCodeAt(i))%360;
  return `hsl(${h},60%,68%)`;
}

// avatars thème motocross
const MOTO_AVATARS = ['🏍️','🏁','🥇','🏆','🐺','🔧','⚙️','💨','🔥','⚡','🎯','👑','💪','🥷','🦊','🦅'];
// cache des avatars par user_id (rempli par les vues)
let AVATARS = {};
// renvoie le HTML du contenu d'un avatar : emoji si choisi, sinon initiale
function avatarInner(uid, pseudo){
  const av = AVATARS[uid];
  if(av) return `<span class="av-emoji">${av}</span>`;

}
function avatarBg(uid, pseudo){
