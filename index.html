<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronos MC Les Morfalous</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --night:#0a1622; --night2:#0f2032; --steel:#16344f;
  --bone:#eef4fa; --bone-dim:#8fa6bb;
  --cyan:#1ea7e1; --cyan-deep:#0d6fa8; --red:#e23b2e;
  --line:#1d3a49; --line2:#1d3a52;
  --green:#2fa84f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--night);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(30,167,225,.12),transparent 50%),
    radial-gradient(ellipse at 90% 100%,rgba(226,59,46,.07),transparent 55%);
  color:var(--bone); font-family:'Barlow',sans-serif;
  min-height:100vh; padding:24px 16px 60px;
}
.wrap{max-width:480px;margin:0 auto}

/* header */
header{text-align:center;margin:10px 0 26px}
.eyebrow{
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.32em;
  text-transform:uppercase;font-size:12px;font-weight:600;color:var(--cyan);margin-bottom:6px;
}
h1{
  font-family:'Archivo Black',sans-serif;font-size:clamp(30px,8vw,44px);
  line-height:.92;text-transform:uppercase;letter-spacing:-.02em;
  background:linear-gradient(180deg,var(--bone),#7fb4d6);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.tagline{color:var(--bone-dim);font-size:14px;margin-top:8px}

/* carte */
.card{
  background:linear-gradient(180deg,var(--night2),var(--night));
  border:1px solid var(--line2);border-radius:18px;
  padding:24px 22px;box-shadow:0 16px 50px rgba(0,0,0,.45);
}

/* onglets */
.tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--night);
  border:1px solid var(--line);border-radius:12px;padding:4px}
.tab{
  flex:1;padding:10px;border:none;background:none;cursor:pointer;border-radius:9px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;
  text-transform:uppercase;letter-spacing:.08em;color:var(--bone-dim);
}
.tab.active{background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff}

/* champs */
.field{margin-bottom:14px}
.field label{
  display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.08em;font-size:12px;font-weight:600;color:var(--bone-dim);margin-bottom:5px;
}
.field input{
  width:100%;padding:12px 14px;border-radius:11px;
  background:var(--night);border:1.5px solid var(--line2);
  color:var(--bone);font-family:'Barlow',sans-serif;font-size:15px;
}
.field input:focus{outline:none;border-color:var(--cyan)}
.row2{display:flex;gap:10px}
.row2 .field{flex:1}

.btn{
  width:100%;padding:13px;border-radius:11px;border:none;cursor:pointer;margin-top:6px;
  background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;font-size:16px;
}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none}

.msg{margin-top:14px;padding:11px 14px;border-radius:10px;font-size:13.5px;
  text-align:center;line-height:1.4;display:none}
.msg.show{display:block}
.msg.err{background:rgba(226,59,46,.12);border:1px solid rgba(226,59,46,.35);color:#ff8a80}
.msg.ok{background:rgba(47,168,79,.12);border:1px solid rgba(47,168,79,.35);color:#7ee29a}

.hint{font-size:12px;color:var(--bone-dim);margin-top:4px;line-height:1.35}
.forgot{background:none;border:none;color:var(--cyan);cursor:pointer;font-size:13px;
  margin-top:12px;display:block;width:100%;text-align:center;font-family:'Barlow',sans-serif}
.forgot:hover{text-decoration:underline}

/* écran connecté (provisoire) */
.welcome{text-align:center;padding:20px 0}
.welcome .big{font-family:'Archivo Black',sans-serif;font-size:26px;margin:10px 0;text-transform:uppercase}
.welcome .sub{color:var(--bone-dim);font-size:15px;line-height:1.5;margin-bottom:20px}
.badge-admin{display:inline-block;margin-top:6px;padding:4px 12px;border-radius:999px;
  background:rgba(226,59,46,.15);border:1px solid var(--red);color:#ff8a80;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:12px;font-weight:700}
.btn-ghost{background:none;border:1px solid var(--line2);color:var(--bone-dim);
  padding:10px 18px;border-radius:10px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.08em;font-size:13px;margin-top:8px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.loading{text-align:center;color:var(--bone-dim);padding:40px 0;font-size:15px}
.placeholder{text-align:center;color:var(--bone-dim);padding:30px 10px;font-size:15px;line-height:1.5}

/* topbar */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.topbar-user{display:flex;align-items:center;gap:10px}
.hello{font-size:15px;color:var(--bone)}
.hello b{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.03em}
.btn-ghost.sm{margin-top:0;padding:7px 12px;font-size:11px}

/* navigation */
.nav{display:flex;gap:6px;margin-bottom:18px;background:var(--night2);
  border:1px solid var(--line);border-radius:12px;padding:4px}
.nav-btn{flex:1;padding:10px 8px;border:none;background:none;cursor:pointer;border-radius:9px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;
  text-transform:uppercase;letter-spacing:.06em;color:var(--bone-dim)}
.nav-btn.active{background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));color:#fff}

/* sections */
.sec-title{font-family:'Archivo Black',sans-serif;font-size:18px;text-transform:uppercase;
  margin-bottom:6px;color:var(--bone)}
.sec-sub{color:var(--bone-dim);font-size:13px;margin-bottom:16px;line-height:1.4}

/* table admin */
.ad-table{width:100%;border-collapse:collapse;font-size:13px}
.ad-table th{text-align:left;padding:8px 6px;color:var(--bone-dim);
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;
  font-size:11px;border-bottom:1px solid var(--line2)}
.ad-table td{padding:10px 6px;border-bottom:1px solid var(--line);vertical-align:middle}
.ad-ord{color:var(--bone-dim);font-family:'Archivo Black',sans-serif;font-size:13px}
.ad-nom{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase}
.ad-date{display:block;font-family:'Barlow',sans-serif;font-weight:400;font-size:11px;
  color:var(--bone-dim);text-transform:none;letter-spacing:0}
.ad-close{font-variant-numeric:tabular-nums;color:var(--bone-dim);font-size:12px}
.tag-done{color:var(--bone-dim);font-size:11px;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.05em}
.tag-open{color:var(--cyan);font-size:11px;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.05em;font-weight:700}

/* sous-navigation pronos */
.subnav{display:flex;gap:6px;margin-bottom:16px}
.sub-btn{flex:1;padding:9px;border:1px solid var(--line2);background:var(--night);cursor:pointer;
  border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;
  text-transform:uppercase;letter-spacing:.06em;color:var(--bone-dim)}
.sub-btn.active{background:var(--night2);border-color:var(--cyan);color:var(--cyan)}

/* liste des manches */
.grp-title{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
  font-size:12px;color:var(--cyan);font-weight:700;margin:6px 0 10px}
.grp-title.muted{color:var(--bone-dim);margin-top:20px}
.manche-row{display:flex;align-items:center;gap:12px;width:100%;cursor:pointer;text-align:left;
  background:#13283d;border:1.5px solid var(--line2);border-radius:12px;padding:13px 14px;margin-bottom:9px;
  transition:border-color .15s,transform .1s}
.manche-row:hover{border-color:var(--cyan);transform:translateY(-1px)}
.manche-row.closed{opacity:.6}
.manche-row.closed:hover{border-color:var(--line2);transform:none}
.m-ord{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--steel);min-width:24px}
.m-info{flex:1;min-width:0}
.m-nom{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  text-transform:uppercase;color:#fff}
.m-date{display:block;font-size:12px;color:var(--bone-dim);text-transform:capitalize}
.m-state{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.m-open{color:var(--cyan);font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em}
.m-closed{color:var(--bone-dim);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.m-done{color:var(--green);font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em}
.m-partial{color:#e0a52e;font-size:11px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}

/* écran prono : podium */
.back{background:none;border:none;color:var(--cyan);cursor:pointer;font-size:13px;
  font-family:'Barlow',sans-serif;margin-bottom:12px;padding:0}
.back:hover{text-decoration:underline}
.countdown-banner{background:rgba(30,167,225,.1);border:1px solid rgba(30,167,225,.35);
  color:var(--cyan);text-align:center;padding:10px;border-radius:10px;margin-bottom:16px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;font-size:14px;font-variant-numeric:tabular-nums}
.podium{background:var(--night);border:1px solid var(--line2);border-radius:13px;padding:16px;margin-bottom:14px}
.podium-head{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.cat-tag{font-family:'Archivo Black',sans-serif;font-size:13px;padding:2px 9px;border-radius:6px;color:#fff}
.cat-450{background:var(--red)}
.cat-250{background:var(--cyan-deep)}
.lock{margin-left:auto;font-size:12px;color:var(--bone-dim);font-weight:400;letter-spacing:0}
.pod-row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.pod-row label{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--bone-dim);min-width:30px}
.pod-row select{flex:1;padding:11px 12px;border-radius:10px;background:var(--night2);
  border:1.5px solid var(--line2);color:var(--bone);font-family:'Barlow',sans-serif;font-size:14px}
.pod-row select:focus{outline:none;border-color:var(--cyan)}
.pod-row select:disabled{opacity:.6}
.pod-bonus{margin-top:8px;padding-top:10px;border-top:1px dashed var(--line2)}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--bone-dim);cursor:pointer;margin-bottom:8px}
.chk input{width:16px;height:16px;accent-color:var(--red)}
.bonus5.hidden{display:none}
.voted-note2{margin-top:8px;padding:12px;border-radius:10px;text-align:center;
  background:rgba(47,168,79,.12);border:1px solid rgba(47,168,79,.35);color:#7ee29a;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-weight:600;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">MC Les Morfalous</div>
    <h1>Pronos<br>Motocross</h1>
    <div class="tagline">Le jeu de pronostics du club · AMA Pro Motocross</div>
  </header>

  <div id="app">
    <div class="loading">Chargement…</div>
  </div>
</div>

<script>
// ====== CONFIG SUPABASE ======
const SUPABASE_URL = "https://ogfjljemwoeavqiagnhj.supabase.co";
const SUPABASE_KEY = "sb_publishable_LQg-9wRHZRHxO6EVdx7UAg_l0bECQjc";
const CODE_CLUB = "MORFALOUS2026";

let sb = null;
try {
  if(!window.supabase || !window.supabase.createClient) throw new Error("Composant Supabase non chargé.");
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e){
  document.getElementById('app').innerHTML =
    `<div class="msg err show">${e.message} Recharge la page (Ctrl+Maj+R).</div>`;
}

const app = document.getElementById('app');

// ====== ÉCRAN AUTH (connexion / inscription) ======
let mode = 'login';

function renderAuth(){
  app.innerHTML = `
    <div class="card">
      <div class="tabs">
        <button class="tab ${mode==='login'?'active':''}" id="tabLogin">Se connecter</button>
        <button class="tab ${mode==='signup'?'active':''}" id="tabSignup">S'inscrire</button>
      </div>
      ${mode==='login' ? loginForm() : signupForm()}
      <div class="msg" id="msg"></div>
    </div>
  `;
  document.getElementById('tabLogin').onclick = ()=>{ mode='login'; renderAuth(); };
  document.getElementById('tabSignup').onclick = ()=>{ mode='signup'; renderAuth(); };

  if(mode==='login'){
    document.getElementById('btnLogin').onclick = doLogin;
    document.getElementById('forgot').onclick = doForgot;
  } else {
    document.getElementById('btnSignup').onclick = doSignup;
  }
}

function loginForm(){
  return `
    <div class="field">
      <label>Email</label>
      <input id="li_email" type="email" autocomplete="email" placeholder="ton@email.fr">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input id="li_pwd" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn" id="btnLogin">Se connecter</button>
    <button class="forgot" id="forgot">Mot de passe oublié ?</button>
  `;
}

function signupForm(){
  return `
    <div class="field">
      <label>Pseudo (visible au classement)</label>
      <input id="su_pseudo" type="text" maxlength="30" placeholder="Ton pseudo">
    </div>
    <div class="row2">
      <div class="field"><label>Prénom</label><input id="su_prenom" type="text" placeholder="Prénom"></div>
      <div class="field"><label>Nom</label><input id="su_nom" type="text" placeholder="Nom"></div>
    </div>
    <div class="field">
      <label>Email</label>
      <input id="su_email" type="email" autocomplete="email" placeholder="ton@email.fr">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input id="su_pwd" type="password" autocomplete="new-password" placeholder="6 caractères minimum">
    </div>
    <div class="field">
      <label>Code club</label>
      <input id="su_code" type="text" placeholder="Code réservé aux licenciés">
      <div class="hint">Ce code t'est communiqué par le club. Sans lui, pas d'inscription.</div>
    </div>
    <button class="btn" id="btnSignup">Créer mon compte</button>
  `;
}

function showMsg(text, type){
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg show ' + type;
}

// ====== ACTIONS ======
async function doSignup(){
  const pseudo = val('su_pseudo'), prenom = val('su_prenom'), nom = val('su_nom');
  const email = val('su_email'), pwd = val('su_pwd'), code = val('su_code');

  if(code !== CODE_CLUB) return showMsg("Code club incorrect. Demande-le au club.", 'err');
  if(pseudo.length < 2) return showMsg("Choisis un pseudo d'au moins 2 caractères.", 'err');
  if(!email.includes('@')) return showMsg("Entre un email valide.", 'err');
  if(pwd.length < 6) return showMsg("Le mot de passe doit faire au moins 6 caractères.", 'err');

  const btn = document.getElementById('btnSignup');
  btn.disabled = true; showMsg("Création du compte…", 'ok');

  // créer le compte Auth en passant pseudo/nom/prénom en métadonnées.
  // Le profil est ensuite créé automatiquement côté base (trigger SQL).
  const { data, error } = await sb.auth.signUp({
    email, password: pwd,
    options: { data: { pseudo, nom, prenom } }
  });
  if(error){ btn.disabled=false; return showMsg(traduitErreur(error.message), 'err'); }

  // selon config Supabase, une confirmation email peut être requise
  if(data.session){
    boot(); // connecté direct (si confirmation désactivée)
  } else {
    showMsg("Compte créé ! Vérifie tes emails (et tes spams) pour confirmer ton adresse, puis connecte-toi.", 'ok');
    mode='login';
    setTimeout(renderAuth, 3500);
  }
}

async function doLogin(){
  const email = val('li_email'), pwd = val('li_pwd');
  if(!email || !pwd) return showMsg("Entre ton email et ton mot de passe.", 'err');
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; showMsg("Connexion…", 'ok');
  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if(error){ btn.disabled=false; return showMsg(traduitErreur(error.message), 'err'); }
  boot();
}

async function doForgot(){
  const email = val('li_email');
  if(!email) return showMsg("Entre d'abord ton email ci-dessus, puis reclique.", 'err');
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if(error) return showMsg(traduitErreur(error.message), 'err');
  showMsg("Email de réinitialisation envoyé (vérifie tes spams).", 'ok');
}

function traduitErreur(m){
  if(m.includes('already registered')) return "Cet email a déjà un compte. Connecte-toi.";
  if(m.includes('Invalid login')) return "Email ou mot de passe incorrect.";
  if(m.includes('Email not confirmed')) return "Confirme d'abord ton email (vérifie tes mails).";
  if(m.includes('rate limit')) return "Trop de tentatives, réessaie dans un moment.";
  return m;
}

const val = id => (document.getElementById(id)?.value || '').trim();

// ====== ÉCRAN CONNECTÉ ======
let currentProfil = null;
let currentSession = null;

async function renderHome(session){
  currentSession = session;
  app.innerHTML = `<div class="card"><div class="loading">Chargement…</div></div>`;
  const uid = session.user.id;
  const { data: profil } = await sb.from('profils').select('*').eq('id', uid).single();
  currentProfil = profil;
  const isAdmin = profil?.is_admin;

  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-user">
        <span class="hello">Salut <b>${profil?.pseudo || ''}</b></span>
        ${isAdmin ? '<span class="badge-admin">★ Admin</span>' : ''}
      </div>
      <button class="btn-ghost sm" id="logout">Déconnexion</button>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-btn active" data-view="pronos">Pronostics</button>
      <button class="nav-btn" data-view="classement">Classement</button>
      ${isAdmin ? '<button class="nav-btn" data-view="admin">Admin</button>' : ''}
    </nav>
    <div id="view"></div>
  `;
  document.getElementById('logout').onclick = async ()=>{ await sb.auth.signOut(); boot(); };
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      switchView(b.dataset.view);
    };
  });
  switchView('pronos');
}

function switchView(view){
  const v = document.getElementById('view');
  if(view === 'admin'){ return renderAdmin(v); }
  if(view === 'classement'){
    v.innerHTML = `<div class="card"><div class="placeholder">Le classement arrivera une fois les premiers pronostics et résultats enregistrés.</div></div>`;
    return;
  }
  return renderPronos(v);
}

// ====== DONNÉES partagées ======
let PILOTES = { '250': [], '450': [] };

async function loadPilotes(){
  if(PILOTES['250'].length) return;
  const { data } = await sb.from('pilotes').select('*').eq('actif', true).order('numero');
  (data||[]).forEach(p=>{ if(PILOTES[p.categorie]) PILOTES[p.categorie].push(p); });
}

function isClosed(manche){
  if(manche.terminee) return true;
  if(!manche.closes_at) return false;
  return Date.now() >= new Date(manche.closes_at).getTime();
}

// ====== VUE PRONOSTICS ======
let pronosState = { mancheId:null, tab:'manches' };

async function renderPronos(v){
  v.innerHTML = `<div class="card"><div class="loading">Chargement…</div></div>`;
  await loadPilotes();
  const { data: manches } = await sb.from('manches').select('*').order('ordre');

  // sous-onglets : par manche / championnat
  v.innerHTML = `
    <div class="subnav">
      <button class="sub-btn ${pronosState.tab==='manches'?'active':''}" id="stManches">Par manche</button>
      <button class="sub-btn ${pronosState.tab==='champ'?'active':''}" id="stChamp">Championnat</button>
    </div>
    <div id="pronoBody"></div>
  `;
  document.getElementById('stManches').onclick = ()=>{ pronosState.tab='manches'; renderPronos(v); };
  document.getElementById('stChamp').onclick = ()=>{ pronosState.tab='champ'; renderPronos(v); };

  if(pronosState.tab==='champ'){ return renderChampPronos(document.getElementById('pronoBody')); }

  // liste des manches : ouvertes en premier
  const body = document.getElementById('pronoBody');
  const open = (manches||[]).filter(m=>!isClosed(m));
  const closed = (manches||[]).filter(m=>isClosed(m));

  // charger mes pronos existants pour afficher l'état
  const { data: mesPronos } = await sb.from('pronos').select('manche_id,categorie')
    .eq('user_id', currentSession.user.id);
  const pronoSet = new Set((mesPronos||[]).map(p=>p.manche_id+'-'+p.categorie));

  const card = (m, closedFlag)=>{
    const has250 = pronoSet.has(m.id+'-250');
    const has450 = pronoSet.has(m.id+'-450');
    const etat = closedFlag
      ? '<span class="m-closed">Fermée</span>'
      : `<span class="m-open" data-countdown="${m.closes_at||''}">${countdownText(m.closes_at)}</span>`;
    const done = (has250&&has450) ? '<span class="m-done">✓ pronostiqué</span>'
               : (has250||has450) ? '<span class="m-partial">à compléter</span>' : '';
    return `<button class="manche-row ${closedFlag?'closed':''}" data-manche="${m.id}">
      <span class="m-ord">${m.ordre}</span>
      <span class="m-info"><span class="m-nom">${m.nom}</span><span class="m-date">${frDate(m.date_course)}</span></span>
      <span class="m-state">${etat}${done}</span>
    </button>`;
  };

  body.innerHTML = `
    ${open.length ? `<div class="grp-title">À pronostiquer</div>` + open.map(m=>card(m,false)).join('') : '<div class="placeholder">Aucune manche ouverte au pronostic pour le moment.</div>'}
    ${closed.length ? `<div class="grp-title muted">Manches fermées</div>` + closed.map(m=>card(m,true)).join('') : ''}
  `;
  body.querySelectorAll('.manche-row').forEach(b=>{
    b.onclick = ()=> openMancheProno(+b.dataset.manche, manches.find(m=>m.id==b.dataset.manche));
  });
  startCountdowns();
}

// ----- compte à rebours -----
function countdownText(closesAt){
  if(!closesAt) return 'Ouverte';
  const left = new Date(closesAt).getTime() - Date.now();
  if(left <= 0) return 'Fermée';
  const d = Math.floor(left/86400000);
  const h = Math.floor(left%86400000/3600000);
  const m = Math.floor(left%3600000/60000);
  if(d > 0) return `Ferme dans ${d}j ${h}h`;
  if(h > 0) return `Ferme dans ${h}h ${String(m).padStart(2,'0')}min`;
  const s = Math.floor(left%60000/1000);
  return `Ferme dans ${m}min ${String(s).padStart(2,'0')}s`;
}
let countdownTimer = null;
function startCountdowns(){
  if(countdownTimer) clearInterval(countdownTimer);
  const tick = ()=>{
    document.querySelectorAll('[data-countdown]').forEach(el=>{
      const ca = el.dataset.countdown;
      el.textContent = countdownText(ca);
      if(ca && new Date(ca).getTime() - Date.now() <= 0){
        el.classList.remove('m-open'); el.classList.add('m-closed');
      }
    });
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

function frDate(d){
  if(!d) return '';
  const dt = new Date(d+'T12:00:00');
  return dt.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'});
}

// ----- écran de prono d'une manche (250 + 450) -----
async function openMancheProno(mancheId, manche){
  const v = document.getElementById('view');
  const closed = isClosed(manche);
  v.innerHTML = `<div class="card"><div class="loading">Chargement…</div></div>`;

  // charger mes pronos existants pour cette manche
  const { data: existing } = await sb.from('pronos').select('*')
    .eq('user_id', currentSession.user.id).eq('manche_id', mancheId);
  const byCat = {};
  (existing||[]).forEach(p=> byCat[p.categorie]=p);

  v.innerHTML = `
    <div class="card">
      <button class="back" id="back">← Retour aux manches</button>
      <div class="sec-title">${manche.nom}</div>
      <p class="sec-sub">${frDate(manche.date_course)} ·
        ${closed ? 'Pronostics fermés' : 'Choisis ton podium pour chaque catégorie'}</p>
      ${closed ? '' : `<div class="countdown-banner" data-countdown="${manche.closes_at||''}">${countdownText(manche.closes_at)}</div>`}
      ${podiumBlock('450', byCat['450'], closed)}
      ${podiumBlock('250', byCat['250'], closed)}
      <div class="msg" id="pmsg"></div>
      ${closed ? '' : `<button class="btn" id="savePronos">Enregistrer mes pronostics</button>`}
    </div>
  `;
  document.getElementById('back').onclick = ()=>{ switchView('pronos'); };
  if(!closed){
    setupPodium('450'); setupPodium('250');
    document.getElementById('savePronos').onclick = ()=>saveMancheProno(mancheId, manche);
    startCountdowns();
  }
}

function podiumBlock(cat, existing, closed){
  const pilotes = PILOTES[cat]||[];
  const opt = (selId)=> '<option value="">—</option>' + pilotes.map(p=>
    `<option value="${p.id}" ${selId==p.id?'selected':''}>#${p.numero||'?'} ${p.nom}</option>`).join('');
  const dis = closed ? 'disabled' : '';
  const e = existing||{};
  return `
    <div class="podium" data-cat="${cat}">
      <div class="podium-head"><span class="cat-tag cat-${cat}">${cat}</span> Podium</div>
      <div class="pod-row"><label>1<sup>er</sup></label><select ${dis} data-pos="p1">${opt(e.p1_pilote_id)}</select></div>
      <div class="pod-row"><label>2<sup>e</sup></label><select ${dis} data-pos="p2">${opt(e.p2_pilote_id)}</select></div>
      <div class="pod-row"><label>3<sup>e</sup></label><select ${dis} data-pos="p3">${opt(e.p3_pilote_id)}</select></div>
      <div class="pod-bonus">
        <label class="chk"><input type="checkbox" ${dis} data-bonus5 ${e.joue_bonus5?'checked':''}> Tenter le bonus 5<sup>e</sup> place</label>
        <div class="pod-row bonus5 ${e.joue_bonus5?'':'hidden'}"><label>5<sup>e</sup></label><select ${dis} data-pos="p5">${opt(e.p5_pilote_id)}</select></div>
      </div>
    </div>
  `;
}

function setupPodium(cat){
  const block = document.querySelector(`.podium[data-cat="${cat}"]`);
  const selects = [...block.querySelectorAll('select[data-pos]')];
  // empêcher de choisir 2x le même pilote (sur p1/p2/p3)
  const refresh = ()=>{
    const chosen = selects.filter(s=>['p1','p2','p3'].includes(s.dataset.pos)).map(s=>s.value).filter(Boolean);
    selects.forEach(s=>{
      if(!['p1','p2','p3'].includes(s.dataset.pos)) return;
      [...s.options].forEach(o=>{
        if(!o.value) return;
        o.disabled = chosen.includes(o.value) && s.value !== o.value;
      });
    });
  };
  selects.forEach(s=> s.onchange = refresh);
  refresh();
  // toggle bonus 5e
  const chk = block.querySelector('input[data-bonus5]');
  chk.onchange = ()=>{
    block.querySelector('.bonus5').classList.toggle('hidden', !chk.checked);
  };
}

async function saveMancheProno(mancheId, manche){
  if(isClosed(manche)){ return showPMsg("Cette manche est fermée.", 'err'); }
  const rows = [];
  for(const cat of ['450','250']){
    const block = document.querySelector(`.podium[data-cat="${cat}"]`);
    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;
    const bonus = block.querySelector('input[data-bonus5]').checked;
    const p1=get('p1'), p2=get('p2'), p3=get('p3'), p5=bonus?get('p5'):null;
    // validation : podium complet requis si on enregistre cette catégorie
    if(p1||p2||p3){
      if(!(p1&&p2&&p3)) return showPMsg(`Complète tout le podium ${cat} (1er, 2e, 3e).`, 'err');
      if(bonus && !p5) return showPMsg(`Choisis ton pilote 5e en ${cat} ou décoche le bonus.`, 'err');
      rows.push({ user_id: currentSession.user.id, manche_id: mancheId, categorie: cat,
        p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, joue_bonus5:bonus });
    }
  }
  if(!rows.length) return showPMsg("Choisis au moins un podium avant d'enregistrer.", 'err');

  showPMsg("Enregistrement…", 'ok');
  const { error } = await sb.from('pronos').upsert(rows, { onConflict:'user_id,manche_id,categorie' });
  if(error) return showPMsg(error.message, 'err');
  showPMsg("✓ Pronostics enregistrés ! Tu peux les modifier jusqu'à la fermeture.", 'ok');
}

function showPMsg(t,type){ const m=document.getElementById('pmsg'); if(m){ m.textContent=t; m.className='msg show '+type; } }

// ----- prono championnat -----
async function renderChampPronos(body){
  body.innerHTML = `<div class="loading">Chargement…</div>`;
  const { data: existing } = await sb.from('pronos_championnat').select('*')
    .eq('user_id', currentSession.user.id);
  const byCat = {}; (existing||[]).forEach(p=>byCat[p.categorie]=p);
  const valide450 = byCat['450']?.valide;
  const valide250 = byCat['250']?.valide;

  body.innerHTML = `
    <p class="sec-sub">Pronostique le podium FINAL du championnat (1er/2e/3e). Une fois validé, c'est figé !</p>
    ${champBlock('450', byCat['450'])}
    ${champBlock('250', byCat['250'])}
    <div class="msg" id="cmsg"></div>
    ${(valide450 && valide250) ? '<div class="voted-note2">✓ Tes pronostics championnat sont validés et figés</div>'
      : `<button class="btn" id="saveChamp">Valider mes pronostics championnat</button>
         <p class="hint" style="text-align:center">⚠️ La validation est définitive, vérifie bien avant !</p>`}
  `;
  if(!(valide450 && valide250)){
    setupChampPodium('450'); setupChampPodium('250');
    document.getElementById('saveChamp').onclick = saveChampProno;
  }
}

function champBlock(cat, existing){
  const pilotes = PILOTES[cat]||[];
  const e = existing||{};
  const closed = e.valide;
  const opt = (selId)=> '<option value="">—</option>' + pilotes.map(p=>
    `<option value="${p.id}" ${selId==p.id?'selected':''}>#${p.numero||'?'} ${p.nom}</option>`).join('');
  const dis = closed ? 'disabled' : '';
  return `
    <div class="podium champ" data-cat="${cat}">
      <div class="podium-head"><span class="cat-tag cat-${cat}">${cat}</span> Podium championnat ${closed?'<span class="lock">🔒 figé</span>':''}</div>
      <div class="pod-row"><label>1<sup>er</sup></label><select ${dis} data-pos="p1">${opt(e.p1_pilote_id)}</select></div>
      <div class="pod-row"><label>2<sup>e</sup></label><select ${dis} data-pos="p2">${opt(e.p2_pilote_id)}</select></div>
      <div class="pod-row"><label>3<sup>e</sup></label><select ${dis} data-pos="p3">${opt(e.p3_pilote_id)}</select></div>
      <div class="pod-bonus">
        <label class="chk"><input type="checkbox" ${dis} data-bonus5 ${e.joue_bonus5?'checked':''}> Tenter le bonus 5<sup>e</sup> place finale</label>
        <div class="pod-row bonus5 ${e.joue_bonus5?'':'hidden'}"><label>5<sup>e</sup></label><select ${dis} data-pos="p5">${opt(e.p5_pilote_id)}</select></div>
      </div>
    </div>
  `;
}

function setupChampPodium(cat){ setupPodium(cat); } // même logique anti-doublon

async function saveChampProno(){
  const rows = [];
  for(const cat of ['450','250']){
    const block = document.querySelector(`.podium.champ[data-cat="${cat}"]`);
    if(!block) continue;
    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;
    const bonus = block.querySelector('input[data-bonus5]').checked;
    const p1=get('p1'), p2=get('p2'), p3=get('p3'), p5=bonus?get('p5'):null;
    if(!(p1&&p2&&p3)) return showCMsg(`Complète tout le podium championnat ${cat}.`, 'err');
    if(bonus && !p5) return showCMsg(`Choisis ton 5e en ${cat} ou décoche le bonus.`, 'err');
    rows.push({ user_id: currentSession.user.id, categorie: cat,
      p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, joue_bonus5:bonus, valide:true });
  }
  if(rows.length<2) return showCMsg("Remplis les deux podiums (250 et 450).", 'err');

  if(!confirm("Valider définitivement tes pronostics championnat ? Tu ne pourras plus les modifier.")) return;
  showCMsg("Validation…", 'ok');
  const { error } = await sb.from('pronos_championnat').upsert(rows, { onConflict:'user_id,categorie' });
  if(error) return showCMsg(error.message, 'err');
  showCMsg("✓ Pronostics championnat validés et figés !", 'ok');
  setTimeout(()=>renderChampPronos(document.getElementById('pronoBody')), 1500);
}

function showCMsg(t,type){ const m=document.getElementById('cmsg'); if(m){ m.textContent=t; m.className='msg show '+type; } }

// ====== ADMIN : gestion du calendrier ======
async function renderAdmin(v){
  v.innerHTML = `<div class="card"><div class="loading">Chargement du calendrier…</div></div>`;
  const { data: manches, error } = await sb.from('manches').select('*').order('ordre');
  if(error){ v.innerHTML = `<div class="card"><div class="msg err show">${error.message}</div></div>`; return; }

  const rows = (manches||[]).map(m=>{
    const closes = m.closes_at ? new Date(m.closes_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
    return `<tr>
      <td class="ad-ord">${m.ordre}</td>
      <td class="ad-nom">${m.nom}<span class="ad-date">${m.date_course||''}</span></td>
      <td class="ad-close">${closes}</td>
      <td>${m.terminee ? '<span class="tag-done">terminée</span>' : '<span class="tag-open">à venir</span>'}</td>
    </tr>`;
  }).join('');

  v.innerHTML = `
    <div class="card">
      <div class="sec-title">Calendrier des manches</div>
      <p class="sec-sub">${(manches||[]).length} manches chargées. La saisie des résultats et l'ajustement des horaires arriveront aux prochaines étapes.</p>
      <table class="ad-table">
        <thead><tr><th>#</th><th>Manche</th><th>Clôture pronos</th><th>Statut</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ====== DÉMARRAGE ======
async function boot(){
  if(!sb) return;
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ renderHome(session); }
  else { renderAuth(); }
}
boot();
</script>
